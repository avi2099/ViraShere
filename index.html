<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViraSphere 🌍 — One place for the world's most viral moments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neon: { purple: '#a855f7', cyan: '#22d3ee', pink: '#ec4899', green: '#34d399' },
            glass: { dark: 'rgba(15,15,30,0.7)', light: 'rgba(255,255,255,0.15)' },
            surface: { dark: '#0a0a1a', light: '#f3f4f6' }
          },
          animation: {
            'glow': 'glow 2s ease-in-out infinite alternate',
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pulse-neon': 'pulseNeon 2s ease-in-out infinite',
          },
          keyframes: {
            glow: { '0%': { boxShadow: '0 0 5px #a855f7, 0 0 10px #a855f7' }, '100%': { boxShadow: '0 0 10px #22d3ee, 0 0 20px #22d3ee' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulseNeon: { '0%,100%': { boxShadow: '0 0 5px #a855f7, 0 0 15px #a855f7' }, '50%': { boxShadow: '0 0 10px #ec4899, 0 0 30px #ec4899' } }
          }
        }
      }
    };
  </script>
  <style>
    /* ========== CUSTOM STYLES ========== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { scroll-behavior: smooth; }
    .glass-card {
      background: rgba(15, 15, 30, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(168, 85, 247, 0.15);
    }
    html:not(.dark) .glass-card {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    .glass-card:hover {
      border-color: rgba(34, 211, 238, 0.4);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.15), 0 8px 32px rgba(0,0,0,0.3);
      transform: translateY(-4px) scale(1.01);
    }
    .glass-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .tab-active { border-bottom: 2px solid #a855f7; color: #a855f7 !important; }
    html:not(.dark) .tab-active { color: #7c3aed !important; border-color: #7c3aed; }
    .neon-btn {
      background: linear-gradient(135deg, #a855f7, #ec4899);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
      transition: all 0.3s;
    }
    .neon-btn:hover { box-shadow: 0 0 25px rgba(168, 85, 247, 0.6); transform: scale(1.05); }
    .pill-active { background: linear-gradient(135deg, #a855f7, #22d3ee); color: white !important; }
    .modal-overlay { backdrop-filter: blur(8px); background: rgba(0,0,0,0.6); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 3px; }
    html:not(.dark) ::-webkit-scrollbar-track { background: #f3f4f6; }
    .hero-gradient { background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(34,211,238,0.2), rgba(236,72,153,0.2)); }
    .toast { animation: slideUp 0.4s ease-out, fadeOut 0.4s ease-in 2.6s forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
    .upvote-pop { animation: pop 0.3s ease-out; }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .shimmer { background: linear-gradient(90deg, transparent, rgba(168,85,247,0.08), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body class="bg-surface-dark text-gray-100 min-h-screen transition-colors duration-300">

<!-- ========== TOAST CONTAINER ========== -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

<!-- ========== HEADER / NAVBAR ========== -->
<header class="sticky top-0 z-50 glass-card border-b border-purple-500/20">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
    <!-- Logo -->
    <a href="#" class="flex items-center gap-2 shrink-0" onclick="switchTab('home');return false;">
      <span class="text-2xl">🌍</span>
      <span class="text-xl font-extrabold bg-gradient-to-r from-neon-purple via-neon-pink to-neon-cyan bg-clip-text text-transparent">ViraSphere</span>
    </a>
    <!-- Search Bar (desktop) -->
    <div class="hidden md:flex flex-1 max-w-md mx-4">
      <div class="relative w-full">
        <input id="search-input" type="text" placeholder="Search viral moments..." class="w-full bg-white/5 dark:bg-white/5 bg-gray-200 border border-purple-500/30 rounded-full px-4 py-2 pl-10 text-sm focus:outline-none focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan transition-all dark:text-gray-100 text-gray-800" oninput="handleSearch(this.value)">
        <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
    </div>
    <!-- Right Controls -->
    <div class="flex items-center gap-3">
      <!-- Dark/Light Toggle -->
      <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition-colors" title="Toggle theme">
        <span id="theme-icon" class="text-xl">🌙</span>
      </button>
      <!-- Mobile Search Toggle -->
      <button onclick="toggleMobileSearch()" class="md:hidden p-2 rounded-full hover:bg-white/10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </button>
      <!-- Hamburger Menu -->
      <button onclick="toggleMobileMenu()" class="md:hidden p-2 rounded-full hover:bg-white/10">
        <svg id="hamburger-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
  <!-- Mobile Search (hidden by default) -->
  <div id="mobile-search" class="hidden px-4 pb-3 md:hidden">
    <input type="text" placeholder="Search viral moments..." class="w-full bg-white/5 border border-purple-500/30 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-neon-cyan dark:text-gray-100 text-gray-800" oninput="handleSearch(this.value)">
  </div>
  <!-- Mobile Menu (hidden by default) -->
  <nav id="mobile-menu" class="hidden md:hidden px-4 pb-4 space-y-1">
    <button onclick="switchTab('home');closeMobileMenu()" class="block w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">🏠 Home</button>
    <button onclick="switchTab('news');closeMobileMenu()" class="block w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">📰 News</button>
    <button onclick="switchTab('social');closeMobileMenu()" class="block w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">💬 Social Buzz</button>
    <button onclick="switchTab('videos');closeMobileMenu()" class="block w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">🎬 Viral Videos</button>
    <button onclick="switchTab('memes');closeMobileMenu()" class="block w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">😂 Memes</button>
    <button onclick="switchTab('community');closeMobileMenu()" class="block w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">🌐 Community</button>
  </nav>
</header>

<!-- ========== MAIN LAYOUT ========== -->
<div class="max-w-7xl mx-auto flex">

  <!-- ========== SIDEBAR (Desktop) ========== -->
  <aside class="hidden lg:block w-64 shrink-0 p-4 sticky top-[65px] h-[calc(100vh-65px)] overflow-y-auto">
    <div class="glass-card rounded-2xl p-4 mb-4">
      <h3 class="text-sm font-semibold text-neon-purple mb-3 uppercase tracking-wider">Region</h3>
      <div class="space-y-1" id="region-filters">
        <button onclick="setFilter('region','all')" class="filter-pill pill-active w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-region="all">🌍 Worldwide</button>
        <button onclick="setFilter('region','asia')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-region="asia">🌏 Asia</button>
        <button onclick="setFilter('region','americas')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-region="americas">🌎 Americas</button>
        <button onclick="setFilter('region','europe')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-region="europe">🌍 Europe</button>
        <button onclick="setFilter('region','africa')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-region="africa">🌍 Africa</button>
        <button onclick="setFilter('region','oceania')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-region="oceania">🌏 Oceania</button>
      </div>
    </div>
    <div class="glass-card rounded-2xl p-4 mb-4">
      <h3 class="text-sm font-semibold text-neon-cyan mb-3 uppercase tracking-wider">Time</h3>
      <div class="space-y-1" id="time-filters">
        <button onclick="setFilter('time','24h')" class="filter-pill pill-active w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-time="24h">⚡ Last 24h</button>
        <button onclick="setFilter('time','week')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-time="week">📅 This week</button>
        <button onclick="setFilter('time','all')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-time="all">♾️ All time</button>
      </div>
    </div>
    <div class="glass-card rounded-2xl p-4 mb-4">
      <h3 class="text-sm font-semibold text-neon-pink mb-3 uppercase tracking-wider">Sort By</h3>
      <div class="space-y-1" id="sort-filters">
        <button onclick="setFilter('sort','hot')" class="filter-pill pill-active w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-sort="hot">🔥 Hottest</button>
        <button onclick="setFilter('sort','latest')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-sort="latest">🕐 Latest</button>
        <button onclick="setFilter('sort','upvoted')" class="filter-pill w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all hover:bg-white/10" data-sort="upvoted">⬆️ Most Upvoted</button>
      </div>
    </div>
    <button onclick="refreshViralData()" class="neon-btn w-full py-2.5 rounded-xl text-white font-semibold text-sm">🔄 Refresh Viral Data</button>
  </aside>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="flex-1 min-w-0 px-4 py-4">

    <!-- Mobile Filter Pills -->
    <div class="lg:hidden mb-4 overflow-x-auto pb-2">
      <div class="flex gap-2 min-w-max">
        <button onclick="setFilter('region','all')" class="filter-pill-mobile pill-active px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-region="all">🌍 Worldwide</button>
        <button onclick="setFilter('region','asia')" class="filter-pill-mobile px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-region="asia">🌏 Asia</button>
        <button onclick="setFilter('region','americas')" class="filter-pill-mobile px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-region="americas">🌎 Americas</button>
        <button onclick="setFilter('region','europe')" class="filter-pill-mobile px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-region="europe">🌍 Europe</button>
        <button onclick="setFilter('region','africa')" class="filter-pill-mobile px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-region="africa">🌍 Africa</button>
        <span class="border-l border-purple-500/30 mx-1"></span>
        <button onclick="setFilter('sort','hot')" class="filter-pill-mobile pill-active px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-sort="hot">🔥 Hot</button>
        <button onclick="setFilter('sort','latest')" class="filter-pill-mobile px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-sort="latest">🕐 Latest</button>
        <button onclick="setFilter('sort','upvoted')" class="filter-pill-mobile px-3 py-1.5 rounded-full text-xs font-medium border border-purple-500/30 transition-all" data-sort="upvoted">⬆️ Top</button>
        <span class="border-l border-purple-500/30 mx-1"></span>
        <button onclick="refreshViralData()" class="px-3 py-1.5 rounded-full text-xs font-medium border border-neon-cyan/50 text-neon-cyan hover:bg-neon-cyan/10 transition-all">🔄 Refresh</button>
      </div>
    </div>

    <!-- ========== TABS ========== -->
    <div class="hidden md:flex gap-1 mb-6 border-b border-purple-500/20 overflow-x-auto">
      <button onclick="switchTab('home')" class="tab-btn tab-active px-4 py-2.5 text-sm font-medium transition-all hover:text-neon-purple whitespace-nowrap" data-tab="home">🏠 Home</button>
      <button onclick="switchTab('news')" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 transition-all hover:text-neon-purple whitespace-nowrap" data-tab="news">📰 News</button>
      <button onclick="switchTab('social')" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 transition-all hover:text-neon-purple whitespace-nowrap" data-tab="social">💬 Social Buzz</button>
      <button onclick="switchTab('videos')" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 transition-all hover:text-neon-purple whitespace-nowrap" data-tab="videos">🎬 Viral Videos</button>
      <button onclick="switchTab('memes')" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 transition-all hover:text-neon-purple whitespace-nowrap" data-tab="memes">😂 Memes</button>
      <button onclick="switchTab('community')" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 transition-all hover:text-neon-purple whitespace-nowrap" data-tab="community">🌐 Community</button>
    </div>
    <!-- Mobile Bottom Tab Bar rendered later -->

    <!-- TAB CONTENT CONTAINER -->
    <div id="tab-content"></div>

    <!-- LOAD MORE -->
    <div class="text-center py-8" id="load-more-container">
      <button onclick="loadMore()" class="px-6 py-3 rounded-xl border border-purple-500/30 text-neon-purple hover:bg-purple-500/10 transition-all font-medium text-sm">Load More Viral Content ⬇️</button>
    </div>
  </main>
</div>

<!-- ========== FLOATING CONTRIBUTE BUTTON ========== -->
<button onclick="openContributeModal()" class="fixed bottom-20 md:bottom-8 right-6 z-40 neon-btn animate-pulse-neon px-5 py-3 rounded-full text-white font-bold text-sm flex items-center gap-2 shadow-2xl">
  <span class="text-lg">+</span> Contribute
</button>

<!-- ========== MOBILE BOTTOM TAB BAR ========== -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 glass-card border-t border-purple-500/20 flex justify-around py-2">
  <button onclick="switchTab('home')" class="mobile-tab flex flex-col items-center gap-0.5 px-2 py-1 text-neon-purple" data-tab="home"><span class="text-lg">🏠</span><span class="text-[10px]">Home</span></button>
  <button onclick="switchTab('news')" class="mobile-tab flex flex-col items-center gap-0.5 px-2 py-1 text-gray-400" data-tab="news"><span class="text-lg">📰</span><span class="text-[10px]">News</span></button>
  <button onclick="switchTab('social')" class="mobile-tab flex flex-col items-center gap-0.5 px-2 py-1 text-gray-400" data-tab="social"><span class="text-lg">💬</span><span class="text-[10px]">Social</span></button>
  <button onclick="switchTab('videos')" class="mobile-tab flex flex-col items-center gap-0.5 px-2 py-1 text-gray-400" data-tab="videos"><span class="text-lg">🎬</span><span class="text-[10px]">Videos</span></button>
  <button onclick="switchTab('memes')" class="mobile-tab flex flex-col items-center gap-0.5 px-2 py-1 text-gray-400" data-tab="memes"><span class="text-lg">😂</span><span class="text-[10px]">Memes</span></button>
  <button onclick="switchTab('community')" class="mobile-tab flex flex-col items-center gap-0.5 px-2 py-1 text-gray-400" data-tab="community"><span class="text-lg">🌐</span><span class="text-[10px]">Community</span></button>
</nav>

<!-- ========== CONTRIBUTE MODAL ========== -->
<div id="contribute-modal" class="hidden fixed inset-0 z-[80] modal-overlay flex items-center justify-center p-4">
  <div class="glass-card rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 animate-slide-up">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold bg-gradient-to-r from-neon-purple to-neon-cyan bg-clip-text text-transparent">✨ Contribute Viral Content</h2>
      <button onclick="closeContributeModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="contribute-form" onsubmit="handleContribute(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-300">Title *</label>
        <input name="title" required maxlength="120" class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan transition-colors dark:text-gray-100 text-gray-800" placeholder="What's going viral?">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-300">Description *</label>
        <textarea name="description" required maxlength="300" rows="3" class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan transition-colors dark:text-gray-100 text-gray-800 resize-none" placeholder="Tell us more..."></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1 text-gray-300">Category *</label>
          <select name="category" required class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan dark:text-gray-100 text-gray-800 dark:bg-gray-900 bg-white">
            <option value="news">📰 News</option>
            <option value="video">🎬 Video</option>
            <option value="meme">😂 Meme</option>
            <option value="event">🎉 Event</option>
            <option value="other">💡 Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1 text-gray-300">Your Country *</label>
          <input name="country" required class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan transition-colors dark:text-gray-100 text-gray-800" placeholder="e.g. India">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-300">URL / Link (optional)</label>
        <input name="link" type="url" class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan transition-colors dark:text-gray-100 text-gray-800" placeholder="https://...">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-300">Image URL (optional)</label>
        <input name="imageUrl" type="url" class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan transition-colors dark:text-gray-100 text-gray-800" placeholder="https://picsum.photos/600/400">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-300">Your Name *</label>
        <input name="authorName" required class="w-full bg-white/5 border border-purple-500/30 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neon-cyan transition-colors dark:text-gray-100 text-gray-800" placeholder="Your name">
      </div>
      <button type="submit" class="neon-btn w-full py-3 rounded-xl text-white font-bold text-sm mt-2">🚀 Submit to Community</button>
    </form>
  </div>
</div>

<!-- ========== VIDEO MODAL ========== -->
<div id="video-modal" class="hidden fixed inset-0 z-[80] modal-overlay flex items-center justify-center p-4">
  <div class="w-full max-w-3xl animate-slide-up">
    <div class="flex justify-end mb-2">
      <button onclick="closeVideoModal()" class="p-2 bg-black/50 hover:bg-white/10 rounded-full transition-colors text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="relative w-full" style="padding-bottom:56.25%;">
      <iframe id="video-iframe" class="absolute inset-0 w-full h-full rounded-2xl" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>
</div>

<!-- ========== JAVASCRIPT ========== -->
<script>
// ===========================
// DATA: Viral content arrays
// ===========================

const regionMap = {
  'India': 'asia', 'Japan': 'asia', 'South Korea': 'asia', 'China': 'asia', 'Philippines': 'asia', 'Indonesia': 'asia',
  'USA': 'americas', 'Brazil': 'americas', 'Mexico': 'americas', 'Canada': 'americas', 'Argentina': 'americas',
  'UK': 'europe', 'France': 'europe', 'Germany': 'europe', 'Spain': 'europe', 'Italy': 'europe',

// ===========================
// FILTER LOGIC
// ===========================

function setFilter(type, value) {
  filters[type] = value;

  // Update desktop pills
  if (type === 'region') {
    document.querySelectorAll('#region-filters .filter-pill').forEach(b => {
      b.classList.toggle('pill-active', b.dataset.region === value);
    });
  } else if (type === 'time') {
    document.querySelectorAll('#time-filters .filter-pill').forEach(b => {
      b.classList.toggle('pill-active', b.dataset.time === value);
    });
  } else if (type === 'sort') {
    document.querySelectorAll('#sort-filters .filter-pill').forEach(b => {
      b.classList.toggle('pill-active', b.dataset.sort === value);
    });
  }

  // Update mobile pills
  document.querySelectorAll('.filter-pill-mobile').forEach(b => {
    if (b.dataset[type] !== undefined) {
      b.classList.toggle('pill-active', b.dataset[type] === value);
    }
  });

  // Reset display count and re-render
  displayCount[currentTab] = ITEMS_PER_PAGE;
  renderCurrentTab();
}

function getFilteredItems(items) {
  let result = [...items];
  const upvotes = getUpvotes();

  // Apply upvote overrides
  result = result.map(item => ({
    ...item,
    upvotes: upvotes[item.id] !== undefined ? upvotes[item.id] : item.upvotes
  }));

  // Region filter
  if (filters.region !== 'all') {
    result = result.filter(item => {
      const r = regionMap[item.region] || 'all';
      return r === filters.region || item.region === 'Worldwide';
    });
  }

  // Search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    result = result.filter(item =>
      item.title.toLowerCase().includes(q) ||
      item.description.toLowerCase().includes(q) ||
      item.source.toLowerCase().includes(q) ||
      item.region.toLowerCase().includes(q)
    );
  }

  // Sort
  if (filters.sort === 'hot') {
    result.sort((a, b) => b.upvotes - a.upvotes);
  } else if (filters.sort === 'latest') {
    // Already in chronological order from data
  } else if (filters.sort === 'upvoted') {
    result.sort((a, b) => b.upvotes - a.upvotes);
  }

  return result;
}

  currentTab = tab;
  if (!displayCount[tab]) displayCount[tab] = ITEMS_PER_PAGE;

  // Update desktop tabs
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('tab-active', b.dataset.tab === tab);
    b.classList.toggle('text-gray-400', b.dataset.tab !== tab);
  });

  // Update mobile bottom tabs
  document.querySelectorAll('.mobile-tab').forEach(b => {
    b.classList.toggle('text-neon-purple', b.dataset.tab === tab);
    b.classList.toggle('text-gray-400', b.dataset.tab !== tab);
  });

  renderCurrentTab();
}

        <p class="text-gray-400 mb-6 max-w-md mx-auto">Be the first to contribute! Share viral moments from your corner of the world.</p>
        <button onclick="openContributeModal()" class="neon-btn px-6 py-3 rounded-xl text-white font-bold">+ Share Something Viral</button>
      </div>
    `;
  } else {
    const header = document.createElement('div');
    header.innerHTML = `
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-bold">🌐 Community Contributions</h2>
          <p class="text-sm text-gray-400">${communityItems.length} submissions from around the world</p>
        </div>
        <button onclick="openContributeModal()" class="neon-btn px-4 py-2 rounded-xl text-white font-semibold text-sm">+ Add Yours</button>
      </div>
    `;
    container.appendChild(header);
    const grid = createGrid(items);
    container.appendChild(grid);
    document.getElementById('load-more-container').style.display = count < filtered.length ? 'block' : 'none';
  }
}

function renderGenericTab(container) {
  const data = getDataForTab(currentTab);
  const filtered = getFilteredItems(data);
  const count = displayCount[currentTab] || ITEMS_PER_PAGE;
  const items = filtered.slice(0, count);

  const tabNames = { news: '📰 Viral News & Events', social: '💬 Social Buzz', videos: '🎬 Viral Videos', memes: '😂 Meme Central' };
  const header = document.createElement('div');
  header.innerHTML = `<h2 class="text-xl font-bold mb-6">${tabNames[currentTab] || ''}</h2>`;
  container.appendChild(header);

  if (currentTab === 'memes') {
    // Meme grid — more columns, image-heavy
    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4';
    items.forEach(item => grid.appendChild(createMemeCard(item)));
    container.appendChild(grid);
  } else {
    const grid = createGrid(items);
    container.appendChild(grid);
  }

  document.getElementById('load-more-container').style.display = count < filtered.length ? 'block' : 'none';
}

function createGrid(items) {
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5';
  items.forEach(item => {
    grid.appendChild(createCard(item));
  });
  if (items.length === 0) {
    grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400"><div class="text-4xl mb-2">🔍</div>No results found. Try a different search or filter.</div>`;
  }
  return grid;
}

// ===========================
// CARD COMPONENTS
// ===========================

        <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold ${catClass}">${item.category.toUpperCase()}</span>

      <h3 class="font-bold text-sm md:text-base mb-1.5 line-clamp-2 leading-snug">${escapeHtml(item.title)}</h3>

        <span>${escapeHtml(item.timeAgo)}</span>

      ${item.authorName ? `<div class="text-xs text-gray-500 mb-3">Contributed by <span class="text-neon-cyan font-medium">${escapeHtml(item.authorName)}</span> from ${escapeHtml(item.country || 'Unknown')}</div>` : ''}
      <div class="flex items-center justify-between pt-3 border-t border-white/5">
        <button onclick="handleUpvote('${item.id}', this)" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-neon-purple/10 transition-colors group/upvote">

        <div class="flex items-center gap-1">
          <button onclick="shareTwitter('${escapeHtml(item.title)}')" title="Share on X" class="p-1.5 rounded-lg hover:bg-white/10 transition-colors text-gray-400 hover:text-white">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

function createMemeCard(item) {
  const upvotes = getUpvotes();
  const currentUpvotes = upvotes[item.id] !== undefined ? upvotes[item.id] : item.upvotes;

  const card = document.createElement('div');
  card.className = 'glass-card rounded-2xl overflow-hidden animate-slide-up';
  card.innerHTML = `
    <img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.title)}" class="w-full h-40 md:h-52 object-cover" loading="lazy" onerror="this.src='https://picsum.photos/seed/${item.id}/600/400'">
    <div class="p-3">
      <h3 class="font-bold text-xs md:text-sm mb-1 line-clamp-2">${escapeHtml(item.title)}</h3>
      <div class="flex items-center justify-between mt-2">
        <button onclick="handleUpvote('${item.id}', this)" class="flex items-center gap-1 text-neon-purple text-xs font-semibold">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
          <span class="upvote-count">${formatUpvotes(currentUpvotes)}</span>
        </button>
        <div class="flex gap-1">
          <button onclick="shareTwitter('${escapeHtml(item.title)}')" class="p-1 rounded hover:bg-white/10 text-gray-400 hover:text-white"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></button>
          <button onclick="copyLink('${escapeHtml(item.title)}')" class="p-1 rounded hover:bg-white/10 text-gray-400 hover:text-neon-cyan"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg></button>
        </div>
      </div>
    </div>
  `;

}

// ===========================
// INTERACTIONS
// ===========================

function handleUpvote(itemId, btnElement) {
  const upvotes = getUpvotes();

  // Find original value from data
  const allData = [...newsData, ...socialData, ...videoData, ...memeData, ...getCommunityData()];
  const item = allData.find(i => i.id === itemId);
  const current = upvotes[itemId] !== undefined ? upvotes[itemId] : (item ? item.upvotes : 0);
  upvotes[itemId] = current + 1;
  saveUpvotes(upvotes);

  // Update UI
  const countEl = btnElement.closest('.glass-card').querySelector('.upvote-count');
  if (countEl) {
    countEl.textContent = formatUpvotes(upvotes[itemId]);
    countEl.classList.add('upvote-pop');
    setTimeout(() => countEl.classList.remove('upvote-pop'), 300);
  }
}

function shareTwitter(title) {
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title + ' — via ViraSphere 🌍')}`;
  window.open(url, '_blank', 'width=550,height=420');
}

function shareWhatsApp(title) {
  const url = `https://wa.me/?text=${encodeURIComponent(title + ' — via ViraSphere 🌍')}`;
  window.open(url, '_blank');
}

function copyLink(title) {
  navigator.clipboard.writeText(title + ' — via ViraSphere 🌍').then(() => {
    showToast('Link copied to clipboard! 📋', 'info');
  }).catch(() => {
    showToast('Could not copy link', 'error');
  });
}

// ===========================
// VIDEO MODAL
// ===========================

function openVideoModal(videoId) {
  document.getElementById('video-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('video-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeVideoModal() {
  document.getElementById('video-iframe').src = '';
  document.getElementById('video-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

// ===========================
// CONTRIBUTE MODAL
// ===========================

function openContributeModal() {
  document.getElementById('contribute-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeContributeModal() {
  document.getElementById('contribute-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function handleContribute(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);

  const newItem = {
    id: 'c_' + Date.now(),
    title: data.get('title'),
    description: data.get('description'),
    source: 'Community',
    timeAgo: 'Just now',
    category: data.get('category'),
    imageUrl: data.get('imageUrl') || `https://picsum.photos/seed/${Date.now()}/600/400`,
    link: data.get('link') || '#',
    upvotes: 0,
    region: data.get('country'),
    authorName: data.get('authorName'),
    country: data.get('country')
  };

  const community = getCommunityData();
  community.unshift(newItem);
  saveCommunityData(community);

  form.reset();
  closeContributeModal();
  showToast('🎉 Your contribution is live! Check the Community tab.', 'success');

  // Switch to community tab
  switchTab('community');
}

// Close modals on overlay click
document.getElementById('contribute-modal').addEventListener('click', function(e) {
  if (e.target === this) closeContributeModal();
});
document.getElementById('video-modal').addEventListener('click', function(e) {
  if (e.target === this) closeVideoModal();
});

// Close modals on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeContributeModal();
    closeVideoModal();
  }
});

// ===========================
// LOAD MORE
// ===========================

function loadMore() {
  displayCount[currentTab] = (displayCount[currentTab] || ITEMS_PER_PAGE) + ITEMS_PER_LOAD;
  renderCurrentTab();
  showToast('Loaded more content ⬇️', 'info');
}

// ===========================
// REFRESH VIRAL DATA
// ===========================

function refreshViralData() {
  // Add 3 random new items to various data arrays
  for (let i = 0; i < 3; i++) {
    const title = viralTitlePool[Math.floor(Math.random() * viralTitlePool.length)];
    const region = regions[Math.floor(Math.random() * regions.length)];
    const source = sources[Math.floor(Math.random() * sources.length)];
    const cat = categories[Math.floor(Math.random() * categories.length)];
    const newItem = {
      id: 'r_' + Date.now() + '_' + i,
      title: title,
      description: "This is trending right now! Everyone is talking about it. Don't miss out on the latest viral sensation.",
      source: source,
      timeAgo: 'Just now',
      category: cat,
      imageUrl: `https://picsum.photos/seed/${Date.now() + i}/600/400`,
      link: '#',
      upvotes: Math.floor(Math.random() * 2000000) + 500000,
      region: region
    };
    if (cat === 'news') newsData.unshift(newItem);
    else if (cat === 'social') socialData.unshift(newItem);
    else if (cat === 'meme') memeData.unshift(newItem);
    else if (cat === 'video') { newItem.videoId = 'dQw4w9WgXcQ'; videoData.unshift(newItem); }
  }

  displayCount[currentTab] = ITEMS_PER_PAGE;
  renderCurrentTab();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('🔄 Fresh viral content loaded!', 'success');
}

// ===========================
// INITIAL RENDER
// ===========================

displayCount['home'] = ITEMS_PER_PAGE;
renderCurrentTab();
</script>
