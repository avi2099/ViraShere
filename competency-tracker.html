*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.heatmap-cell{transition:all .2s;cursor:pointer;border-radius:4px;}
.heatmap-cell:hover{transform:scale(1.1);z-index:10;}

select:focus,input:focus,textarea:focus{border-color:#1EA8E8;}
button{cursor:pointer;transition:all .15s;}
.btn-primary{background:#1EA8E8;color:#fff;padding:8px 16px;border-radius:8px;border:none;font-weight:600;}
.btn-primary:hover{background:#1890C8;}
.btn-gold{background:#E8A020;color:#04080E;padding:8px 16px;border-radius:8px;border:none;font-weight:600;}

.btn-danger{background:#E84040;color:#fff;padding:8px 16px;border-radius:8px;border:none;font-weight:600;}
.btn-danger:hover{background:#C83030;}
.btn-ghost{background:transparent;color:var(--text-primary);padding:8px 16px;border-radius:8px;border:1px solid var(--border-color);font-weight:500;transition:all .3s;}
.btn-ghost:hover{border-color:var(--border-hover);background:var(--ghost-hover-bg);}
.tooltip{position:relative;}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--tooltip-bg);color:var(--tooltip-text);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;}
.tooltip:hover::after{opacity:1;}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--tab-text);font-weight:600;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;}
.tab-btn.active{color:#1EA8E8;border-bottom-color:#1EA8E8;}
.tab-btn:hover{color:var(--tab-hover);}
.modal-overlay{position:fixed;inset:0;background:var(--modal-overlay);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--modal-bg);border:1px solid var(--border-color);border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto;transition:background-color .3s;}

    { q: 'Q4', y: 2025, ts: '2025-12-15T10:00:00Z', tsMgr: '2025-12-20T10:00:00Z' },
  ];
  // Use a seeded-ish random for reproducibility per employee+comp
  function seededRand(seed) { let x = Math.sin(seed) * 10000; return x - Math.floor(x); }
  let seedCounter = 42;

  assessed.forEach(empId => {
    const emp = employees.find(e => e.id === empId);
    if (!emp) return;
    // Generate a base score map for Q1, then slightly improve each quarter
    const baseScores = {};
    allCompetencies.forEach(comp => {
      let base = 2.5;
      if (emp.level === 'IL2') base = 3.5;
      else if (emp.level === 'IL3') base = 3;
      else if (emp.level === 'IL4') base = 2.8;
      else if (emp.level === 'IL5') base = 2.3;
      else base = 1.8;
      if (emp.department.includes('Platform') && ['C001','C002','C003','C004','C008','C009','C010'].includes(comp.id)) base += 1;
      if (emp.department.includes('Semantic') && ['C002','C005','C006','C007'].includes(comp.id)) base += 1;
      if (emp.department.includes('Governance') && ['C011','C012','C013','C014','C015','C016'].includes(comp.id)) base += 1;
      if (emp.department === 'Value Stream' && ['C017','C018','C019','C022'].includes(comp.id)) base += 0.5;
      seedCounter++;
      const noise = seededRand(seedCounter) * 1.6 - 0.8;
      baseScores[comp.id] = Math.max(1, Math.min(5, Math.round(base + noise)));
    });

    quarters.forEach((qInfo, qi) => {
      const scores = {};
      allCompetencies.forEach(comp => {
        // Each quarter adds a small improvement (0 to 0.4 per quarter on average)
        seedCounter++;
        const improvement = qi * (0.15 + seededRand(seedCounter) * 0.25);
        const val = Math.max(1, Math.min(5, Math.round(baseScores[comp.id] + improvement)));
        scores[comp.id] = val;
      });
      assessments.push({
        id: `A-${empId}-${qInfo.q}-${qInfo.y}`,
        employeeId: empId,
        assessorId: empId,
        type: 'self',
        quarter: qInfo.q,
        year: qInfo.y,
        scores,
        timestamp: qInfo.ts
      });
      if (emp.reportsTo) {
        const mgrScores = {};
        allCompetencies.forEach(comp => {
          seedCounter++;
          const delta = seededRand(seedCounter) > 0.5 ? 0 : (seededRand(seedCounter + 1) > 0.5 ? 1 : -1);
          mgrScores[comp.id] = Math.max(1, Math.min(5, scores[comp.id] + delta));
        });
        assessments.push({
          id: `A-${empId}-${qInfo.q}-${qInfo.y}-mgr`,
          employeeId: empId,
          assessorId: emp.reportsTo,
          type: 'manager',
          quarter: qInfo.q,
          year: qInfo.y,
          scores: mgrScores,
          timestamp: qInfo.tsMgr
        });
      }
    });
  });
  return assessments;
}

const DB_KEYS = {
  employees: 'ct_employees',

  assessments: 'ct_assessments',
  training: 'ct_training',
  nominations: 'ct_nominations',
  currentUser: 'ct_currentUser',
  initialized: 'ct_initialized'
};

const DataLayer = {
  _get(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } },
  _set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },

  isInitialized() { return localStorage.getItem(DB_KEYS.initialized) === 'true'; },

  initialize() {
    if (this.isInitialized()) return;
    this._set(DB_KEYS.employees, SEED_EMPLOYEES);
    this._set(DB_KEYS.categories, SEED_COMPETENCY_CATEGORIES);
    const assessments = generateSeedAssessments(SEED_EMPLOYEES, SEED_COMPETENCY_CATEGORIES);
    this._set(DB_KEYS.assessments, assessments);
    this._set(DB_KEYS.training, SEED_TRAINING_PROGRAMS);
    this._set(DB_KEYS.nominations, SEED_NOMINATIONS);
    localStorage.setItem(DB_KEYS.initialized, 'true');
  },

  resetAll() {
    Object.values(DB_KEYS).forEach(k => localStorage.removeItem(k));
    this.initialize();
  },

  getEmployees() { return this._get(DB_KEYS.employees) || []; },
  setEmployees(e) { this._set(DB_KEYS.employees, e); },

  getCategories() { return this._get(DB_KEYS.categories) || []; },
  setCategories(c) { this._set(DB_KEYS.categories, c); },

  getAssessments() { return this._get(DB_KEYS.assessments) || []; },
  setAssessments(a) { this._set(DB_KEYS.assessments, a); },

  addAssessment(a) { const all = this.getAssessments(); const idx = all.findIndex(x => x.id === a.id); if (idx >= 0) all[idx] = a; else all.push(a); this.setAssessments(all); },

  getTraining() { return this._get(DB_KEYS.training) || []; },
  setTraining(t) { this._set(DB_KEYS.training, t); },

  getNominations() { return this._get(DB_KEYS.nominations) || []; },
  setNominations(n) { this._set(DB_KEYS.nominations, n); },
  addNomination(n) { const all = this.getNominations(); all.push(n); this.setNominations(all); },
  updateNomination(id, updates) { const all = this.getNominations(); const idx = all.findIndex(x => x.id === id); if (idx >= 0) { all[idx] = {...all[idx], ...updates}; this.setNominations(all); } },

  getCurrentUser() { return localStorage.getItem(DB_KEYS.currentUser) || 'E001'; },
  setCurrentUser(id) { localStorage.setItem(DB_KEYS.currentUser, id); },
};

let _supabaseClient = null;

function getSupabaseClient() {
  if (_supabaseClient) return _supabaseClient;
  const url = localStorage.getItem('ct_supabase_url');
  const key = localStorage.getItem('ct_supabase_key');
  if (url && key && window.supabase) {
    try { _supabaseClient = window.supabase.createClient(url, key); } catch(e) { _supabaseClient = null; }
  }
  return _supabaseClient;
}

function resetSupabaseClient() { _supabaseClient = null; }

const DataService = {
  isSupabaseConnected() {
    return !!getSupabaseClient() && !!localStorage.getItem('ct_supabase_connected');
  },

  async testConnection() {
    const client = getSupabaseClient();
    if (!client) return false;
    try {
      const { error } = await client.from('employees').select('id', { count: 'exact', head: true });
      return !error;
    } catch { return false; }
  },

  // ── Employees ──
  async getEmployees() {
    if (this.isSupabaseConnected()) {
      const { data, error } = await getSupabaseClient().from('employees').select('*');
      if (!error && data) return data.map(r => ({ id: r.id, name: r.name, role: r.role, level: r.level, team: r.team, department: r.department || r.team, reportsTo: r.reports_to }));
    }
    return DataLayer.getEmployees();
  },
  async setEmployees(emps) {
    DataLayer.setEmployees(emps);
  },

  // ── Categories ──
  async getCategories() {
    if (this.isSupabaseConnected()) {
      const sb = getSupabaseClient();
      const { data: cats } = await sb.from('competency_categories').select('*').order('sort_order');
      const { data: comps } = await sb.from('competencies').select('*');
      if (cats && comps) return cats.map(c => ({ id: c.id, name: c.name, color: c.color, competencies: comps.filter(co => co.category_id === c.id).map(co => ({ id: co.id, name: co.name, description: co.description || '' })) }));
    }
    return DataLayer.getCategories();
  },
  async setCategories(cats) {
    DataLayer.setCategories(cats);
  },

  // ── Assessments ──
  async getAssessments() {
    if (this.isSupabaseConnected()) {
      const { data } = await getSupabaseClient().from('assessments').select('*');
      if (data) {
        // Group by assessment logical key (empId + quarter + year + type implied by assessor)
        // The Supabase model stores one row per competency; we need to aggregate to match localStorage shape
        // Actually for simplicity, we store in Supabase in the same shape as localStorage using a jsonb scores column
        // But the SQL schema has per-competency rows. We'll handle both.
        return data;
      }
    }
    return DataLayer.getAssessments();
  },
  async addAssessment(a) {
    DataLayer.addAssessment(a);
    if (this.isSupabaseConnected()) {
      try {
        const sb = getSupabaseClient();
        // Upsert the assessment record
        await sb.from('assessments').upsert({ id: a.id, employee_id: a.employeeId, competency_id: '_bulk', self_score: null, manager_score: null, quarter: a.quarter, year: a.year, assessed_date: a.timestamp }, { onConflict: 'id' });
      } catch(e) { console.warn('Supabase sync failed:', e); }
    }
  },
  async getAssessmentsByEmployee(empId) {
    const all = await this.getAssessments();
    return all.filter(a => a.employeeId === empId);
  },
  async getAssessmentsByQuarter(quarter, year) {
    const all = await this.getAssessments();
    return all.filter(a => a.quarter === quarter && a.year === year);
  },

  // ── Training ──
  async getTrainingPrograms() {
    return DataLayer.getTraining();
  },
  async setTraining(t) {
    DataLayer.setTraining(t);
  },

  // ── Nominations ──
  async getNominations() {
    return DataLayer.getNominations();
  },
  async addNomination(nom) {
    DataLayer.addNomination(nom);
  },
  async updateNomination(id, updates) {
    DataLayer.updateNomination(id, updates);
  },

  // ── Sync operations ──
  async pushToSupabase() {
    const sb = getSupabaseClient();
    if (!sb) throw new Error('Not connected to Supabase');
    const employees = DataLayer.getEmployees();
    const categories = DataLayer.getCategories();
    const assessments = DataLayer.getAssessments();
    const training = DataLayer.getTraining();
    const nominations = DataLayer.getNominations();

    // Push employees
    const empRows = employees.map(e => ({ id: e.id, name: e.name, role: e.role, level: e.level, team: e.team, department: e.department, reports_to: e.reportsTo || null }));
    await sb.from('employees').upsert(empRows, { onConflict: 'id' });

    // Push categories
    const catRows = categories.map((c, i) => ({ id: c.id, name: c.name, color: c.color, sort_order: i }));
    await sb.from('competency_categories').upsert(catRows, { onConflict: 'id' });

    // Push competencies
    const compRows = categories.flatMap(c => c.competencies.map(co => ({ id: co.id, category_id: c.id, name: co.name, description: co.description || '' })));
    await sb.from('competencies').upsert(compRows, { onConflict: 'id' });

    // Push training
    const trainRows = training.map(t => ({ id: t.id, name: t.name, description: t.provider || '', duration: t.duration, competency_ids: t.competencies }));
    await sb.from('training_programs').upsert(trainRows, { onConflict: 'id' });

    // Push nominations
    const nomRows = nominations.map(n => ({ id: n.id, employee_id: n.employeeId, training_id: n.programId, status: n.status, nominated_by: n.nominatedBy, nominated_date: n.nominatedDate, completion_date: n.completedDate || null, notes: '' }));
    await sb.from('training_nominations').upsert(nomRows, { onConflict: 'id' });

    return true;
  },

  async pullFromSupabase() {
    const sb = getSupabaseClient();
    if (!sb) throw new Error('Not connected to Supabase');
    const { data: emps } = await sb.from('employees').select('*');
    if (emps) DataLayer.setEmployees(emps.map(r => ({ id: r.id, name: r.name, role: r.role, level: r.level, team: r.team, department: r.department || r.team, reportsTo: r.reports_to })));
    const { data: cats } = await sb.from('competency_categories').select('*').order('sort_order');
    const { data: comps } = await sb.from('competencies').select('*');
    if (cats && comps) DataLayer.setCategories(cats.map(c => ({ id: c.id, name: c.name, color: c.color, competencies: comps.filter(co => co.category_id === c.id).map(co => ({ id: co.id, name: co.name, description: co.description || '' })) })));
    const { data: trains } = await sb.from('training_programs').select('*');
    if (trains) DataLayer.setTraining(trains.map(t => ({ id: t.id, name: t.name, provider: t.description || '', duration: t.duration, mode: '', competencies: t.competency_ids || [] })));
    const { data: noms } = await sb.from('training_nominations').select('*');
    if (noms) DataLayer.setNominations(noms.map(n => ({ id: n.id, employeeId: n.employee_id, programId: n.training_id, nominatedBy: n.nominated_by, status: n.status, nominatedDate: n.nominated_date, completedDate: n.completion_date })));
    return true;
  }
};

function getDirectReports(empId, employees) {
  return employees.filter(e => e.reportsTo === empId);
}
function getAllReports(empId, employees) {
  const direct = getDirectReports(empId, employees);
  let all = [...direct];
  direct.forEach(d => { all = all.concat(getAllReports(d.id, employees)); });
  return all;
}
function getLatestAssessment(empId, type, assessments) {
  return assessments.filter(a => a.employeeId === empId && a.type === type).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0] || null;
}
function avgScore(scores) {
  const vals = Object.values(scores);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function getCategoryAvg(scores, category) {
  const compIds = category.competencies.map(c=>c.id);
  const vals = compIds.map(id => scores[id]).filter(v => v !== undefined);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function scoreColor(score) {
  if (score >= 4.5) return '#1EC88A';
  if (score >= 3.5) return '#1EA8E8';
  if (score >= 3) return '#E8A020';
  if (score >= 2) return '#E87040';
  return '#E84040';
}
function heatmapBg(score) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (score === 0) return isDark ? '#0A1220' : '#F7FAFC';
  if (score >= 4.5) return isDark ? 'rgba(30,200,138,.35)' : 'rgba(30,200,138,.2)';
  if (score >= 3.5) return isDark ? 'rgba(30,168,232,.30)' : 'rgba(30,168,232,.15)';
  if (score >= 3) return isDark ? 'rgba(232,160,32,.25)' : 'rgba(232,160,32,.15)';
  if (score >= 2) return isDark ? 'rgba(232,112,64,.25)' : 'rgba(232,112,64,.15)';
  return isDark ? 'rgba(232,64,64,.25)' : 'rgba(232,64,64,.15)';
}
function levelBadgeColor(level) {
  switch(level) {
    case 'IL2': return '#E8A020';
    case 'IL3': return '#9B6EF8';
    case 'IL4': return '#1EA8E8';
    case 'IL5': return '#1EC88A';
    case 'IL6': return '#3A5068';
    default: return '#3A5068';
  }
}
function statusColor(status) {
  switch(status) {
    case 'Nominated': return '#E8A020';
    case 'Approved': return '#1EA8E8';
    case 'In Progress': return '#9B6EF8';
    case 'Completed': return '#1EC88A';
    default: return '#3A5068';
  }
}
function exportCSV(headers, rows, filename) {
  const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
}
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); }

function getAssessmentsForQuarter(empId, type, quarter, year, assessments) {
  return assessments.filter(a => a.employeeId === empId && a.type === type && a.quarter === quarter && a.year === year);
}
function getDistinctQuarters(assessments) {
  const qMap = {};
  assessments.forEach(a => { const key = `${a.quarter} ${a.year}`; qMap[key] = { quarter: a.quarter, year: a.year }; });
  return Object.values(qMap).sort((a, b) => a.year !== b.year ? a.year - b.year : parseInt(a.quarter.slice(1)) - parseInt(b.quarter.slice(1)));
}
function quarterLabel(q, y) { return `${q} ${y}`; }
function quarterSortKey(q, y) { return y * 10 + parseInt(q.slice(1)); }

function RadarChart({ labels, datasets, width = 350, height = 350 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const theme = document.documentElement.getAttribute('data-theme');
  const gridC = getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim();
  const textC = getComputedStyle(document.documentElement).getPropertyValue('--chart-text').trim();
  const legendC = getComputedStyle(document.documentElement).getPropertyValue('--chart-legend').trim();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'radar',
      data: { labels, datasets: datasets.map(ds => ({ ...ds, pointBackgroundColor: ds.borderColor, pointBorderColor: ds.borderColor, pointRadius: 3 })) },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { r: { min: 0, max: 5, ticks: { stepSize: 1, color: textC, backdropColor: 'transparent', font:{size:10} }, grid: { color: gridC }, pointLabels: { color: legendC, font: { size: 10 } } } },
        plugins: { legend: { labels: { color: legendC, font:{size:11} } } }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [labels, datasets, theme]);
  return <canvas ref={canvasRef} style={{width, height}} />;
}

// ═══════════════════════════════════════════════════════════════

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-box fade-in">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold" style={{color:'var(--text-primary)'}}>{title}</h3>
          <button onClick={onClose} className="text-xl" style={{color:'var(--text-muted)'}}>&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, color = '#1EA8E8', icon }) {
  return (
    <div className="card">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-xs uppercase tracking-wider" style={{color:'var(--text-muted)'}}>{label}</div>
          <div className="text-2xl font-bold mt-1" style={{color}}>{value}</div>
          {sub && <div className="text-xs mt-1" style={{color:'var(--text-muted)'}}>{sub}</div>}
        </div>
        {icon && <div className="text-3xl opacity-30" style={{color}}>{icon}</div>}
      </div>
    </div>
  );
}

function LevelBadge({ level }) {
  return <span className="badge" style={{background: levelBadgeColor(level) + '22', color: levelBadgeColor(level), border: `1px solid ${levelBadgeColor(level)}44`}}>{level}</span>;
}

function StatusBadge({ status }) {
  const c = statusColor(status);
  return <span className="badge" style={{background: c + '22', color: c, border: `1px solid ${c}44`}}>{status}</span>;
}

function ScoreBadge({ score }) {
  const c = scoreColor(score);
  return <span className="badge" style={{background: c + '22', color: c, border: `1px solid ${c}44`}}>{score.toFixed(1)}</span>;
}

function Heatmap({ rows, columns, getData, getRowLabel, getColLabel }) {
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-xs">
        <thead>
          <tr>
            <th className="text-left p-2" style={{color:'var(--text-muted)',minWidth:150}}>Team / Unit</th>
            {columns.map((col,i) => <th key={i} className="p-2 text-center" style={{color:'var(--text-muted)',minWidth:80,maxWidth:100}}><div className="truncate">{getColLabel(col)}</div></th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((row,ri) => (
            <tr key={ri}>
              <td className="p-2 font-medium" style={{color:'var(--text-primary)'}}>{getRowLabel(row)}</td>
              {columns.map((col,ci) => {
                const val = getData(row, col);
                return (
                  <td key={ci} className="p-1 text-center">
                    <div className="heatmap-cell p-2 font-semibold" style={{background: heatmapBg(val), color: val > 0 ? scoreColor(val) : 'var(--text-muted)'}}>
                      {val > 0 ? val.toFixed(1) : '-'}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function TataLogo() {
  return (
    <div className="tata-logo-svg">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#1565C0" stroke="#1976D2" strokeWidth="1.5"/>
        <path d="M10 13H30V17H22.5V30H17.5V17H10V13Z" fill="white"/>
      </svg>
      <div>
        <div className="font-extrabold text-sm tracking-widest" style={{color:'#1565C0',lineHeight:'1.1'}}>TATA STEEL</div>
      </div>
    </div>
  );
}

function Header({ currentUser, employees, onUserChange, theme, onToggleTheme }) {
  const emp = employees.find(e => e.id === currentUser);
  return (
    <header className="flex items-center justify-between px-5 py-3" style={{background:'var(--header-bg)',borderBottom:'1px solid var(--border-color)',boxShadow:'0 1px 3px rgba(0,0,0,.05)',transition:'background-color .3s'}}>
      <div className="flex items-center gap-4">
        <TataLogo />
        <div style={{width:1,height:28,background:'var(--border-color)'}}></div>
        <div className="text-sm font-semibold" style={{color:'var(--text-primary)'}}>Data Office Competency Tracker</div>
      </div>
      <div className="flex items-center gap-3">
        <button className="theme-toggle" onClick={onToggleTheme} title={theme === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'}>
          {theme === 'light' ? (
            <span title="Dark mode">&#9790;</span>
          ) : (
            <span title="Light mode">&#9788;</span>
          )}
          <span className="text-xs font-medium">{theme === 'light' ? 'Dark' : 'Light'}</span>
        </button>
        <div style={{width:1,height:24,background:'var(--border-color)'}}></div>
        <div className="text-xs" style={{color:'var(--text-muted)'}}>Logged in as:</div>
        <select value={currentUser} onChange={e => onUserChange(e.target.value)} className="text-sm" style={{minWidth:220}}>
          {employees.sort((a,b) => {
            const lo = {IL2:0,IL3:1,IL4:2,IL5:3,IL6:4};
            return (lo[a.level]||5) - (lo[b.level]||5);
          }).map(e => <option key={e.id} value={e.id}>{e.name} ({e.level} - {e.role})</option>)}
        </select>
        {emp && (
          <div className="flex items-center gap-2 ml-2">
            <LevelBadge level={emp.level} />
          </div>
        )}
      </div>
    </header>
  );
}

const NAV_ITEMS = [
  { id: 'dashboard', label: 'Dashboard', icon: '\u2302' },
  { id: 'profile', label: 'My Competency Profile', icon: '\u2660' },
  { id: 'self-assessment', label: 'Self Assessment', icon: '\u270E' },
  { id: 'team', label: 'Team View', icon: '\u2638' },
  { id: 'framework', label: 'Competency Framework', icon: '\u2699' },
  { id: 'employee-mgmt', label: 'Employee Management', icon: '\u263A' },
  { id: 'training', label: 'Training Hub', icon: '\u2602' },
  { id: 'gap-analysis', label: 'Gap Analysis & Reports', icon: '\u2604' },
  { id: 'org', label: 'Org Overview', icon: '\u2616' },
  { id: 'settings', label: 'Settings', icon: '\u2699' },
];

function isAdminUser(emp) {
  if (!emp) return false;
  if (emp.level === 'IL2') return true;
  const adminNames = JSON.parse(localStorage.getItem('ct_admins') || '["Abhimanyu"]');
  return adminNames.map(n => n.toLowerCase()).includes(emp.name.toLowerCase());
}

function Sidebar({ activePage, onNavigate, currentUser, employees }) {
  const emp = employees.find(e => e.id === currentUser);
  const isManager = emp && ['IL2','IL3','IL4'].includes(emp.level);
  const isCDO = isAdminUser(emp);
  return (
    <aside className="flex-shrink-0 overflow-y-auto" style={{width:240,background:'var(--sidebar-bg)',borderRight:'1px solid var(--border-color)',minHeight:'calc(100vh - 52px)',boxShadow:'var(--sidebar-shadow)',transition:'background-color .3s'}}>
      <nav className="py-3">
        {NAV_ITEMS.map(item => {
          if (item.id === 'team' && !isManager) return null;
          if (item.id === 'framework' && !isCDO) return null;
          if (item.id === 'employee-mgmt' && !isCDO) return null;
          if (item.id === 'settings') {
            return (
              <React.Fragment key={item.id}>
                <div className="my-2 mx-4" style={{borderTop:'1px solid var(--border-color)'}}></div>
                <button
                  onClick={() => onNavigate(item.id)}
                  className={`sidebar-link w-full text-left px-4 py-2.5 text-sm flex items-center gap-3 ${activePage === item.id ? 'active' : ''}`}
                  style={{color: activePage === item.id ? '#1EA8E8' : 'var(--text-muted)'}}>
                  <span className="text-base">{item.icon}</span>
                  {item.label}
                </button>
              </React.Fragment>
            );
          }
          return (
            <button key={item.id}
              onClick={() => onNavigate(item.id)}
              className={`sidebar-link w-full text-left px-4 py-2.5 text-sm flex items-center gap-3 ${activePage === item.id ? 'active' : ''}`}
              style={{color: activePage === item.id ? '#1EA8E8' : 'var(--text-primary)'}}>
              <span className="text-base">{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </nav>
      <div className="mt-4 mx-4 p-3 rounded-lg" style={{background:'var(--bg-tertiary)',border:'1px solid var(--border-color)',transition:'background-color .3s'}}>
        <div className="text-xs font-semibold mb-2" style={{color:'var(--text-muted)'}}>QUICK INFO</div>
        {emp && (
          <div className="text-xs space-y-1" style={{color:'var(--text-primary)'}}>
            <div><span style={{color:'var(--text-muted)'}}>Name:</span> {emp.name}</div>
            <div><span style={{color:'var(--text-muted)'}}>Role:</span> {emp.role}</div>
            <div><span style={{color:'var(--text-muted)'}}>Team:</span> {emp.team}</div>
          </div>
        )}
      </div>
    </aside>
  );
}

// DASHBOARD PAGE
// ═══════════════════════════════════════════════════════════════

function DashboardPage({ employees, categories, assessments, nominations, currentUser }) {
  const allComps = categories.flatMap(c => c.competencies);
  const assessed = employees.filter(e => assessments.some(a => a.employeeId === e.id));
  const assessedPct = employees.length ? Math.round(assessed.length / employees.length * 100) : 0;

  const allScores = [];
  assessed.forEach(emp => {
    const latest = getLatestAssessment(emp.id, 'self', assessments);
    if (latest) allScores.push(latest);
  });

  const orgAvg = allScores.length ? allScores.reduce((sum,a) => sum + avgScore(a.scores), 0) / allScores.length : 0;

  const catAvgs = categories.map(cat => {
    const vals = allScores.map(a => getCategoryAvg(a.scores, cat)).filter(v => v > 0);
    return { name: cat.name, avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0, color: cat.color };
  });

  const compAvgs = allComps.map(comp => {
    const vals = allScores.map(a => a.scores[comp.id]).filter(v => v !== undefined);
    return { name: comp.name, avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0 };
  }).sort((a,b) => a.avg - b.avg);

  const topGaps = compAvgs.slice(0, 5);

  const criticalGaps = compAvgs.filter(c => c.avg > 0 && c.avg < TRAINING_THRESHOLD).length;

  const departments = [...new Set(employees.map(e => e.department))];

  const heatRows = departments;
  const heatCols = categories;
  function heatData(dept, cat) {
    const deptEmps = employees.filter(e => e.department === dept);
    const vals = [];
    deptEmps.forEach(emp => {
      const a = getLatestAssessment(emp.id, 'self', assessments);
      if (a) vals.push(getCategoryAvg(a.scores, cat));
    });
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  }

  const nomByStatus = { Nominated: 0, Approved: 0, 'In Progress': 0, Completed: 0 };
  nominations.forEach(n => { if (nomByStatus[n.status] !== undefined) nomByStatus[n.status]++; });

  // Score distribution
  const distBuckets = [0,0,0,0,0];
  allScores.forEach(a => {
    const avg = avgScore(a.scores);
    const bucket = Math.min(4, Math.max(0, Math.floor(avg) - 1));
    distBuckets[bucket]++;
  });

  return (
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold" style={{color:'#E8A020'}}>CDO Dashboard</h2>
        <div className="text-xs" style={{color:'var(--text-muted)'}}>Last updated: {(() => { const qs = getDistinctQuarters(assessments); return qs.length ? quarterLabel(qs[qs.length-1].quarter, qs[qs.length-1].year) : 'N/A'; })()}</div>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <StatCard label="Total Employees" value={employees.length} sub="Data Office" color="#1EA8E8" icon="&#9782;" />
        <StatCard label="Assessed" value={`${assessedPct}%`} sub={`${assessed.length} of ${employees.length}`} color="#1EC88A" icon="&#9998;" />
        <StatCard label="Org Avg Score" value={orgAvg.toFixed(1)} sub="out of 5.0" color="#E8A020" icon="&#9733;" />
        <StatCard label="Critical Gaps" value={criticalGaps} sub="competencies below 3.0" color="#E84040" icon="&#9888;" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="card">
          <h3 className="text-sm font-semibold mb-3" style={{color:'var(--text-primary)'}}>Category-wise Average Scores</h3>
          <div style={{height:280}}>
            <BarChart
              labels={catAvgs.map(c => c.name)}
              datasets={[{
                label: 'Avg Score',
                data: catAvgs.map(c => Number(c.avg.toFixed(2))),
                backgroundColor: catAvgs.map(c => c.color + '88'),
                borderColor: catAvgs.map(c => c.color),
                borderWidth: 1
              }]}
            />
          </div>
        </div>
        <div className="card">
          <h3 className="text-sm font-semibold mb-3" style={{color:'var(--text-primary)'}}>Score Distribution</h3>
          <div style={{height:280}} className="flex justify-center">
            <DoughnutChart
              labels={['1 - No Knowledge','2 - Basic','3 - Working','4 - Advanced','5 - Expert']}
              data={distBuckets}
              colors={['#E84040','#E87040','#E8A020','#1EA8E8','#1EC88A']}
            />
          </div>
        </div>
      </div>

      {/* Org Competency Trend - Quarter over Quarter */}
      {(() => {
        const allQuarters = getDistinctQuarters(assessments);
        if (allQuarters.length > 1) {
          const trendLabels = allQuarters.map(q => quarterLabel(q.quarter, q.year));
          // Overall org average per quarter
          const orgTrendData = allQuarters.map(qInfo => {
            const qAssessments = assessments.filter(a => a.type === 'self' && a.quarter === qInfo.quarter && a.year === qInfo.year);
            if (!qAssessments.length) return null;
            const avg = qAssessments.reduce((s, a) => s + avgScore(a.scores), 0) / qAssessments.length;
            return Number(avg.toFixed(2));
          });
          // Per-category trend
          const catTrends = categories.map(cat => ({
            label: cat.name,
            data: allQuarters.map(qInfo => {
              const qAssessments = assessments.filter(a => a.type === 'self' && a.quarter === qInfo.quarter && a.year === qInfo.year);
              if (!qAssessments.length) return null;
              const vals = qAssessments.map(a => getCategoryAvg(a.scores, cat)).filter(v => v > 0);
              return vals.length ? Number((vals.reduce((s,v) => s+v, 0) / vals.length).toFixed(2)) : null;
            }),
            borderColor: cat.color,
            backgroundColor: cat.color + '33',
            borderWidth: 2
          }));
          return (
            <div className="card">
              <h3 className="text-sm font-semibold mb-3" style={{color:'var(--text-primary)'}}>Org Competency Trend (Quarter-over-Quarter)</h3>
              <div style={{height: 320}}>
                <LineChart
                  labels={trendLabels}
                  datasets={[
                    { label: 'Overall Org Avg', data: orgTrendData, borderColor: '#E8A020', backgroundColor: '#E8A02033', borderWidth: 3, borderDash: [] },
                    ...catTrends
                  ]}
                />
              </div>
            </div>
          );
        }
        return null;
      })()}

      <div className="card">
        <h3 className="text-sm font-semibold mb-3" style={{color:'var(--text-primary)'}}>Team / Department Heatmap</h3>
        <Heatmap rows={heatRows} columns={heatCols} getData={heatData} getRowLabel={r => r} getColLabel={c => c.name} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="card">
          <h3 className="text-sm font-semibold mb-3" style={{color:'var(--text-primary)'}}>Top Competency Gaps (Lowest Averages)</h3>
          <div className="space-y-2">
            {topGaps.map((g,i) => (
              <div key={i} className="flex items-center justify-between p-2 rounded" style={{background:'var(--bg-tertiary)'}}>
                <span className="text-xs">{g.name}</span>
                <ScoreBadge score={g.avg} />
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <h3 className="text-sm font-semibold mb-3" style={{color:'var(--text-primary)'}}>Training Pipeline Summary</h3>
          <div className="grid grid-cols-2 gap-3">
            {Object.entries(nomByStatus).map(([status, count]) => (
              <div key={status} className="p-3 rounded-lg text-center" style={{background:'var(--bg-tertiary)'}}>
                <div className="text-lg font-bold" style={{color: statusColor(status)}}>{count}</div>
                <div className="text-xs" style={{color:'var(--text-muted)'}}>{status}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// COMPETENCY PROFILE PAGE
// ═══════════════════════════════════════════════════════════════

function ProfilePage({ currentUser, employees, categories, assessments, nominations, training }) {
  const emp = employees.find(e => e.id === currentUser);
  const selfAssessment = getLatestAssessment(currentUser, 'self', assessments);
  const mgrAssessment = getLatestAssessment(currentUser, 'manager', assessments);
  const allComps = categories.flatMap(c => c.competencies);
  const myNoms = nominations.filter(n => n.employeeId === currentUser);

  const catLabels = categories.map(c => c.name);
  const selfCatScores = categories.map(c => selfAssessment ? getCategoryAvg(selfAssessment.scores, c) : 0);
  const mgrCatScores = categories.map(c => mgrAssessment ? getCategoryAvg(mgrAssessment.scores, c) : 0);

  const radarDatasets = [];
  if (selfAssessment) radarDatasets.push({ label: 'Self Assessment', data: selfCatScores, borderColor: '#1EA8E8', backgroundColor: 'rgba(30,168,232,.15)', borderWidth: 2 });
  if (mgrAssessment) radarDatasets.push({ label: 'Manager Assessment', data: mgrCatScores, borderColor: '#E8A020', backgroundColor: 'rgba(232,160,32,.15)', borderWidth: 2 });

  const gaps = [];
  if (selfAssessment) {
    allComps.forEach(comp => {
      const s = selfAssessment.scores[comp.id];
      const m = mgrAssessment ? mgrAssessment.scores[comp.id] : null;
      const effective = m !== null ? Math.min(s, m) : s;
      if (effective < TRAINING_THRESHOLD) gaps.push({ comp, selfScore: s, mgrScore: m, effective });
    });
  }

  const recommendedTraining = training.filter(t =>
    t.competencies.some(cid => gaps.some(g => g.comp.id === cid))
  );

  if (!emp) return <div>Select a user</div>;
  return (
    <div className="fade-in space-y-5">
      <h2 className="text-xl font-bold" style={{color:'#1EA8E8'}}>My Competency Profile</h2>
      <div className="card flex items-center gap-4">
        <div className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-bold" style={{background:'var(--bg-deep)',color:'#E8A020'}}>
          {emp.name.split(' ').map(n=>n[0]).join('')}
        </div>
        <div>
          <div className="font-semibold text-lg">{emp.name}</div>
          <div className="text-sm" style={{color:'var(--text-muted)'}}>{emp.role}</div>
          <div className="flex items-center gap-2 mt-1">
            <LevelBadge level={emp.level} />
            <span className="text-xs" style={{color:'var(--text-muted)'}}>{emp.team}</span>
          </div>
        </div>
        <div className="ml-auto text-right">
          {selfAssessment && <div><span className="text-xs" style={{color:'var(--text-muted)'}}>Overall Score: </span><span className="text-lg font-bold" style={{color: scoreColor(avgScore(selfAssessment.scores))}}>{avgScore(selfAssessment.scores).toFixed(1)}</span></div>}
          {selfAssessment && <div className="text-xs" style={{color:'var(--text-muted)'}}>Last assessed: {selfAssessment.quarter} {selfAssessment.year}</div>}
        </div>
      </div>

      {!selfAssessment ? (
        <div className="card text-center py-10">
          <div className="text-lg mb-2" style={{color:'var(--text-muted)'}}>No assessment found</div>
          <div className="text-sm" style={{color:'var(--text-muted)'}}>Please complete a self assessment to view your profile.</div>
        </div>
      ) : (
        <>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="card">
              <h3 className="text-sm font-semibold mb-3">Competency Radar</h3>
              <div style={{height:320}} className="flex justify-center">
                <RadarChart labels={catLabels} datasets={radarDatasets} />
              </div>
            </div>
            <div className="card">
              <h3 className="text-sm font-semibold mb-3">Category Breakdown</h3>
              <div className="space-y-3 mt-2">
                {categories.map((cat,i) => {
                  const selfVal = selfCatScores[i];
                  const mgrVal = mgrCatScores[i];
                  return (
                    <div key={cat.id}>
                      <div className="flex justify-between text-xs mb-1">
                        <span style={{color: cat.color}}>{cat.name}</span>
                        <span>Self: {selfVal.toFixed(1)} {mgrAssessment ? `| Mgr: ${mgrVal.toFixed(1)}` : ''}</span>
                      </div>
                      <div className="h-2 rounded-full" style={{background:'var(--bg-deep)'}}>
                        <div className="h-2 rounded-full" style={{width: `${selfVal/5*100}%`, background: cat.color, transition:'width .5s'}}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Competency Progression Over Time */}
          {(() => {
            const myAssessments = assessments.filter(a => a.employeeId === currentUser);
            const myQuarters = getDistinctQuarters(myAssessments);
            if (myQuarters.length > 1) {
              const qLabels = myQuarters.map(q => quarterLabel(q.quarter, q.year));
              const catDatasets = [];
              categories.forEach(cat => {
                // Self - solid line
                catDatasets.push({
                  label: `${cat.name} (Self)`,
                  data: myQuarters.map(qInfo => {
                    const a = myAssessments.find(x => x.type === 'self' && x.quarter === qInfo.quarter && x.year === qInfo.year);
                    return a ? Number(getCategoryAvg(a.scores, cat).toFixed(2)) : null;
                  }),
                  borderColor: cat.color,
                  backgroundColor: cat.color + '33',
                  borderWidth: 2,
                  borderDash: []
                });
                // Manager - dashed line
                const hasMgr = myAssessments.some(x => x.type === 'manager');
                if (hasMgr) {
                  catDatasets.push({
                    label: `${cat.name} (Mgr)`,
                    data: myQuarters.map(qInfo => {
                      const a = myAssessments.find(x => x.type === 'manager' && x.quarter === qInfo.quarter && x.year === qInfo.year);
                      return a ? Number(getCategoryAvg(a.scores, cat).toFixed(2)) : null;
                    }),
                    borderColor: cat.color,
                    backgroundColor: cat.color + '22',
                    borderWidth: 2,
                    borderDash: [6, 3]
                  });
                }
              });
              return (
                <div className="card">
                  <h3 className="text-sm font-semibold mb-3">Competency Progression Over Time</h3>
                  <div style={{height: 340}}>
                    <LineChart labels={qLabels} datasets={catDatasets} />
                  </div>
                  <div className="text-xs mt-2" style={{color:'var(--text-muted)'}}>Solid lines = Self Assessment, Dashed lines = Manager Assessment</div>
                </div>
              );
            }
            return null;
          })()}

          {/* Assessment History */}
          {(() => {
            const myAssessments = assessments.filter(a => a.employeeId === currentUser && a.type === 'self');
            const myQuarters = getDistinctQuarters(myAssessments).sort((a,b) => quarterSortKey(b.quarter, b.year) - quarterSortKey(a.quarter, a.year));
            if (myQuarters.length > 0) {
              return (
                <div className="card">
                  <h3 className="text-sm font-semibold mb-3">Assessment History</h3>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr style={{borderBottom:'1px solid var(--border-color)'}}>
                          <th className="text-left p-2" style={{color:'var(--text-muted)'}}>Quarter</th>
                          <th className="text-left p-2" style={{color:'var(--text-muted)'}}>Category</th>
                          <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Avg Self</th>
                          <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Avg Manager</th>
                          <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Change</th>
                        </tr>
                      </thead>
                      <tbody>
                        {myQuarters.map((qInfo, qi) => {
                          const selfA = myAssessments.find(a => a.quarter === qInfo.quarter && a.year === qInfo.year);
                          const mgrA = assessments.find(a => a.employeeId === currentUser && a.type === 'manager' && a.quarter === qInfo.quarter && a.year === qInfo.year);
                          const prevQ = myQuarters[qi + 1]; // next in array = previous in time
                          const prevSelfA = prevQ ? myAssessments.find(a => a.quarter === prevQ.quarter && a.year === prevQ.year) : null;
                          return categories.map((cat, ci) => {
                            const selfAvg = selfA ? getCategoryAvg(selfA.scores, cat) : 0;
                            const mgrAvg = mgrA ? getCategoryAvg(mgrA.scores, cat) : 0;
                            const prevSelfAvg = prevSelfA ? getCategoryAvg(prevSelfA.scores, cat) : null;
                            const change = prevSelfAvg !== null ? selfAvg - prevSelfAvg : null;
                            const changeIcon = change === null ? '-' : change > 0.1 ? String.fromCharCode(8593) : change < -0.1 ? String.fromCharCode(8595) : String.fromCharCode(8594);
                            const changeColor = change === null ? 'var(--text-muted)' : change > 0.1 ? '#1EC88A' : change < -0.1 ? '#E84040' : '#E8A020';
                            return (
                              <tr key={`${qInfo.quarter}${qInfo.year}${cat.id}`} style={{borderBottom: ci === categories.length - 1 ? '2px solid var(--border-color)' : '1px solid var(--border-color)'}}>
                                {ci === 0 ? <td className="p-2 font-semibold" rowSpan={categories.length}>{quarterLabel(qInfo.quarter, qInfo.year)}</td> : null}
                                <td className="p-2" style={{color: cat.color}}>{cat.name}</td>
                                <td className="text-center p-2"><span style={{color: scoreColor(selfAvg)}}>{selfAvg.toFixed(1)}</span></td>
                                <td className="text-center p-2">{mgrA ? <span style={{color: scoreColor(mgrAvg)}}>{mgrAvg.toFixed(1)}</span> : <span style={{color:'var(--text-muted)'}}>-</span>}</td>
                                <td className="text-center p-2"><span style={{color: changeColor, fontWeight: 600}}>{changeIcon} {change !== null ? (change > 0 ? '+' : '') + change.toFixed(1) : ''}</span></td>
                              </tr>
                            );
                          });
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            }
            return null;
          })()}

          <div className="card">
            <h3 className="text-sm font-semibold mb-3">Detailed Competency Scores</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border-color)'}}>
                    <th className="text-left p-2" style={{color:'var(--text-muted)'}}>Competency</th>
                    <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Self</th>
                    {mgrAssessment && <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Manager</th>}
                    <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Gap</th>
                    <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {categories.map(cat => (
                    <React.Fragment key={cat.id}>
                      <tr><td colSpan={mgrAssessment ? 5 : 4} className="pt-3 pb-1 px-2 font-semibold text-xs" style={{color: cat.color}}>{cat.name}</td></tr>
                      {cat.competencies.map(comp => {
                        const s = selfAssessment.scores[comp.id] || 0;
                        const m = mgrAssessment ? (mgrAssessment.scores[comp.id] || 0) : null;
                        const isGap = s < TRAINING_THRESHOLD || (m !== null && m < TRAINING_THRESHOLD);
                        return (
                          <tr key={comp.id} style={{borderBottom:'1px solid var(--border-color)'}}>
                            <td className="p-2">{comp.name}</td>
                            <td className="text-center p-2"><span className="font-semibold" style={{color: scoreColor(s)}}>{s}</span></td>
                            {mgrAssessment && <td className="text-center p-2"><span className="font-semibold" style={{color: scoreColor(m)}}>{m}</span></td>}
                            <td className="text-center p-2">{m !== null ? <span style={{color: (s-m) > 0 ? '#E8A020' : (s-m) < 0 ? '#1EC88A' : '#3A5068'}}>{s-m > 0 ? '+':''}{s-m}</span> : '-'}</td>
                            <td className="text-center p-2">{isGap ? <span className="badge" style={{background:'#E8404022',color:'#E84040',border:'1px solid #E8404044',fontSize:10}}>Training Needed</span> : <span style={{color:'#1EC88A'}}>OK</span>}</td>
                          </tr>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {gaps.length > 0 && (
            <div className="card">
              <h3 className="text-sm font-semibold mb-3" style={{color:'#E84040'}}>Recommended Training (Based on Gaps)</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {recommendedTraining.map(t => (
                  <div key={t.id} className="p-3 rounded-lg" style={{background:'var(--bg-tertiary)',border:'1px solid var(--border-color)'}}>
                    <div className="font-semibold text-sm">{t.name}</div>
                    <div className="text-xs mt-1" style={{color:'var(--text-muted)'}}>{t.provider} | {t.duration} | {t.mode}</div>
                    <div className="flex flex-wrap gap-1 mt-2">
                      {t.competencies.map(cid => {
                        const comp = allComps.find(c => c.id === cid);
                        return comp ? <span key={cid} className="badge" style={{background:'#1EA8E822',color:'#1EA8E8',fontSize:9}}>{comp.name}</span> : null;
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {myNoms.length > 0 && (
            <div className="card">
              <h3 className="text-sm font-semibold mb-3">My Training Nominations</h3>
              <div className="space-y-2">
                {myNoms.map(n => {
                  const prog = training.find(t => t.id === n.programId);
                  return (
                    <div key={n.id} className="flex items-center justify-between p-2 rounded" style={{background:'var(--bg-tertiary)'}}>
                      <span className="text-sm">{prog ? prog.name : n.programId}</span>
                      <StatusBadge status={n.status} />
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SELF ASSESSMENT PAGE
// ═══════════════════════════════════════════════════════════════

function SelfAssessmentPage({ currentUser, employees, categories, assessments, onSaveAssessment }) {
  const emp = employees.find(e => e.id === currentUser);
  const existing = getLatestAssessment(currentUser, 'self', assessments);
  const allComps = categories.flatMap(c => c.competencies);
  const [quarter, setQuarter] = useState('Q1');
  const [year, setYear] = useState(2026);
  const [scores, setScores] = useState(() => {
    const init = {};
    allComps.forEach(c => { init[c.id] = existing ? (existing.scores[c.id] || 3) : 3; });
    return init;
  });
  const [saved, setSaved] = useState(false);
  const [saveMode, setSaveMode] = useState('new'); // 'new' or 'update'

  // Check if assessment already exists for selected quarter
  const existingForQuarter = assessments.find(a => a.employeeId === currentUser && a.type === 'self' && a.quarter === quarter && a.year === year);
  // Find which quarters already have assessments
  const assessedQuarters = useMemo(() => {
    const set = new Set();
    assessments.filter(a => a.employeeId === currentUser && a.type === 'self').forEach(a => set.add(`${a.quarter}-${a.year}`));
    return set;
  }, [assessments, currentUser]);

  // When quarter/year changes, load existing scores if available
  useEffect(() => {
    if (existingForQuarter) {
      const init = {};
      allComps.forEach(c => { init[c.id] = existingForQuarter.scores[c.id] || 3; });
      setScores(init);
      setSaveMode('update');
    } else {
      // Pre-fill from latest assessment if exists
      const latest = getLatestAssessment(currentUser, 'self', assessments);
      const init = {};
      allComps.forEach(c => { init[c.id] = latest ? (latest.scores[c.id] || 3) : 3; });
      setScores(init);
      setSaveMode('new');
    }
  }, [quarter, year, currentUser]);

  function handleSave() {
    const assessment = {
      id: `A-${currentUser}-${quarter}-${year}`,
      employeeId: currentUser,
      assessorId: currentUser,
      type: 'self',
      quarter,
      year,
      scores: {...scores},
      timestamp: new Date().toISOString()
    };
    onSaveAssessment(assessment);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  }

  return (
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold" style={{color:'#1EA8E8'}}>Self Assessment</h2>
        <div className="flex items-center gap-3">
          <div className="flex gap-1">
            {['Q1','Q2','Q3','Q4'].map(q => {
              const isAssessed = assessedQuarters.has(`${q}-${year}`);
              return (
                <button key={q} onClick={() => setQuarter(q)}
                  className="text-xs px-3 py-1.5 rounded-lg font-semibold"
                  style={{
                    background: quarter === q ? '#1EA8E8' : isAssessed ? '#1EC88A22' : 'var(--bg-tertiary)',
                    color: quarter === q ? '#fff' : isAssessed ? '#1EC88A' : 'var(--text-primary)',
                    border: `1px solid ${quarter === q ? '#1EA8E8' : isAssessed ? '#1EC88A44' : 'var(--border-color)'}`
                  }}>
                  {q} {isAssessed && quarter !== q ? '\u2713' : ''}
                </button>
              );
            })}
          </div>
          <input type="number" value={year} onChange={e => setYear(Number(e.target.value))} className="text-sm w-20" />
          <button onClick={handleSave} className="btn-primary text-sm">{saved ? 'Saved!' : (saveMode === 'update' ? 'Update Assessment' : 'Save Assessment')}</button>
        </div>
      </div>
      {existingForQuarter && !saved && (
        <div className="p-3 rounded-lg text-sm flex items-center justify-between" style={{background:'#E8A02022',border:'1px solid #E8A02044',color:'#E8A020'}}>
          <span>You have already submitted an assessment for {quarter} {year}. Saving will update the existing record.</span>
        </div>
      )}
      {saved && <div className="p-3 rounded-lg text-sm" style={{background:'#1EC88A22',border:'1px solid #1EC88A44',color:'#1EC88A'}}>Assessment {saveMode === 'update' ? 'updated' : 'saved'} successfully for {quarter} {year}.</div>}
      {categories.map(cat => (
        <div key={cat.id} className="card">
          <h3 className="text-sm font-semibold mb-4" style={{color: cat.color}}>{cat.name}</h3>
          <div className="space-y-4">
            {cat.competencies.map(comp => (
              <div key={comp.id} className="p-3 rounded-lg" style={{background:'var(--bg-tertiary)'}}>
                <div className="flex items-center justify-between mb-1">
                  <div className="text-sm font-medium">{comp.name}</div>
                  <div className="flex items-center gap-2">
                    <span className="text-lg font-bold" style={{color: scoreColor(scores[comp.id])}}>{scores[comp.id]}</span>
                    <span className="text-xs" style={{color:'var(--text-muted)'}}>{RATING_LABELS[scores[comp.id]]}</span>
                  </div>
                </div>
                <div className="text-xs mb-2" style={{color:'var(--text-muted)'}}>{comp.description}</div>
                <input type="range" min="1" max="5" step="1" value={scores[comp.id]}
                  onChange={e => setScores(prev => ({...prev, [comp.id]: Number(e.target.value)}))}
                  className="range-track w-full" />
                <div className="flex justify-between text-xs mt-1" style={{color:'var(--text-muted)'}}>
                  <span>1-No Knowledge</span><span>2-Basic</span><span>3-Working</span><span>4-Advanced</span><span>5-Expert</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="text-center pb-4">
        <button onClick={handleSave} className="btn-primary text-sm px-8">{saved ? 'Saved!' : 'Save Assessment'}</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TEAM VIEW PAGE
// ═══════════════════════════════════════════════════════════════

function TeamViewPage({ currentUser, employees, categories, assessments, onSaveAssessment, nominations, training, onAddNomination }) {
  const reports = getAllReports(currentUser, employees);
  const directReports = getDirectReports(currentUser, employees);
  const [selectedMember, setSelectedMember] = useState(directReports.length ? directReports[0].id : '');
  const [tab, setTab] = useState('overview');
  const allComps = categories.flatMap(c => c.competencies);

  // Manager assessment state
  const memberSelf = selectedMember ? getLatestAssessment(selectedMember, 'self', assessments) : null;
  const memberMgr = selectedMember ? getLatestAssessment(selectedMember, 'manager', assessments) : null;
  const [mgrScores, setMgrScores] = useState(() => {
    const init = {};
    allComps.forEach(c => { init[c.id] = memberMgr ? (memberMgr.scores[c.id] || 3) : (memberSelf ? (memberSelf.scores[c.id] || 3) : 3); });
    return init;
  });
  const [mgrQuarter, setMgrQuarter] = useState('Q1');
  const [mgrYear, setMgrYear] = useState(2026);
  const [mgrSaved, setMgrSaved] = useState(false);

  // Nomination state
  const [nomProgram, setNomProgram] = useState('');
  const [nomSaved, setNomSaved] = useState(false);

  useEffect(() => {
    const init = {};
    const latestMgr = selectedMember ? getLatestAssessment(selectedMember, 'manager', assessments) : null;
    const latestSelf = selectedMember ? getLatestAssessment(selectedMember, 'self', assessments) : null;
    allComps.forEach(c => { init[c.id] = latestMgr ? (latestMgr.scores[c.id] || 3) : (latestSelf ? (latestSelf.scores[c.id] || 3) : 3); });
    setMgrScores(init);
  }, [selectedMember]);

  function handleMgrSave() {
    const assessment = {
      id: `A-${selectedMember}-${mgrQuarter}-${mgrYear}-mgr`,
      employeeId: selectedMember,
      assessorId: currentUser,
      type: 'manager',
      quarter: mgrQuarter,
      year: mgrYear,
      scores: {...mgrScores},
      timestamp: new Date().toISOString()
    };
    onSaveAssessment(assessment);
    setMgrSaved(true);
    setTimeout(() => setMgrSaved(false), 3000);
  }

  function handleNominate() {
    if (!nomProgram || !selectedMember) return;
    onAddNomination({
      id: uid(),
      employeeId: selectedMember,
      programId: nomProgram,
      nominatedBy: currentUser,
      status: 'Nominated',
      nominatedDate: new Date().toISOString().split('T')[0],
      completedDate: null
    });
    setNomSaved(true);
    setNomProgram('');
    setTimeout(() => setNomSaved(false), 3000);
  }

  // Heatmap for team
  const heatRows = reports;
  const heatCols = categories;
  function heatData(emp, cat) {
    const a = getLatestAssessment(emp.id, 'self', assessments);
    return a ? getCategoryAvg(a.scores, cat) : 0;
  }

  return (
    <div className="fade-in space-y-5">
      <h2 className="text-xl font-bold" style={{color:'#1EA8E8'}}>Team View</h2>
      <div className="flex gap-2 border-b" style={{borderColor:'var(--border-color)'}}>
        {['overview','assess','nominate'].map(t => (
          <button key={t} className={`tab-btn ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
            {t === 'overview' ? 'Team Overview' : t === 'assess' ? 'Manager Assessment' : 'Nominate Training'}
          </button>
        ))}
      </div>

      {tab === 'overview' && (
        <>
          <div className="card">
            <h3 className="text-sm font-semibold mb-3">Team Competency Heatmap ({reports.length} members)</h3>
            {reports.length > 0 ? (
              <Heatmap rows={heatRows} columns={heatCols} getData={heatData} getRowLabel={r => r.name} getColLabel={c => c.name} />
            ) : <div className="text-sm" style={{color:'var(--text-muted)'}}>No team members found.</div>}
          </div>
          <div className="card">
            <h3 className="text-sm font-semibold mb-3">Direct Reports</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              {directReports.map(emp => {
                const a = getLatestAssessment(emp.id, 'self', assessments);
                const avg = a ? avgScore(a.scores) : 0;
                return (
                  <div key={emp.id} className="p-3 rounded-lg" style={{background:'var(--bg-tertiary)',border:'1px solid var(--border-color)'}}>
                    <div className="font-semibold text-sm">{emp.name}</div>
                    <div className="text-xs" style={{color:'var(--text-muted)'}}>{emp.role}</div>
                    <div className="flex items-center justify-between mt-2">
                      <LevelBadge level={emp.level} />
                      {a ? <ScoreBadge score={avg} /> : <span className="text-xs" style={{color:'var(--text-muted)'}}>Not assessed</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}

      {tab === 'assess' && (
        <>
          <div className="card">
            <div className="flex items-center gap-3 mb-4">
              <label className="text-sm" style={{color:'var(--text-muted)'}}>Select Team Member:</label>
              <select value={selectedMember} onChange={e => setSelectedMember(e.target.value)} className="text-sm" style={{minWidth:200}}>
                {reports.map(e => <option key={e.id} value={e.id}>{e.name} ({e.level})</option>)}
              </select>
              <select value={mgrQuarter} onChange={e => setMgrQuarter(e.target.value)} className="text-sm">
                <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
              </select>
              <input type="number" value={mgrYear} onChange={e => setMgrYear(Number(e.target.value))} className="text-sm w-20" />
              <button onClick={handleMgrSave} className="btn-gold text-sm">{mgrSaved ? 'Saved!' : 'Save Manager Assessment'}</button>
            </div>
            {mgrSaved && <div className="p-2 rounded text-sm mb-3" style={{background:'#1EC88A22',color:'#1EC88A'}}>Manager assessment saved.</div>}
          </div>
          {categories.map(cat => (
            <div key={cat.id} className="card">
              <h3 className="text-sm font-semibold mb-3" style={{color: cat.color}}>{cat.name}</h3>
              <div className="space-y-3">
                {cat.competencies.map(comp => {
                  const selfScore = memberSelf ? memberSelf.scores[comp.id] : null;
                  return (
                    <div key={comp.id} className="p-3 rounded-lg" style={{background:'var(--bg-tertiary)'}}>
                      <div className="flex items-center justify-between mb-1">
                        <div>
                          <span className="text-sm font-medium">{comp.name}</span>
                          {selfScore !== null && <span className="text-xs ml-3" style={{color:'var(--text-muted)'}}>Self: <span style={{color: scoreColor(selfScore)}}>{selfScore}</span></span>}
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-lg font-bold" style={{color: scoreColor(mgrScores[comp.id])}}>{mgrScores[comp.id]}</span>
                          <span className="text-xs" style={{color:'var(--text-muted)'}}>{RATING_LABELS[mgrScores[comp.id]]}</span>
                        </div>
                      </div>
                      <input type="range" min="1" max="5" step="1" value={mgrScores[comp.id]}
                        onChange={e => setMgrScores(prev => ({...prev, [comp.id]: Number(e.target.value)}))}
                        className="range-track w-full" />
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>
      )}

      {tab === 'nominate' && (
        <div className="card">
          <h3 className="text-sm font-semibold mb-4">Nominate for Training</h3>
          <div className="flex items-center gap-3 mb-4">
            <select value={selectedMember} onChange={e => setSelectedMember(e.target.value)} className="text-sm" style={{minWidth:200}}>
              {reports.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
            <select value={nomProgram} onChange={e => setNomProgram(e.target.value)} className="text-sm" style={{minWidth:250}}>
              <option value="">Select Training Program</option>
              {training.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <button onClick={handleNominate} className="btn-primary text-sm" disabled={!nomProgram}>Nominate</button>
          </div>
          {nomSaved && <div className="p-2 rounded text-sm mb-3" style={{background:'#1EC88A22',color:'#1EC88A'}}>Nomination submitted.</div>}
          <h4 className="text-xs font-semibold mt-4 mb-2" style={{color:'var(--text-muted)'}}>Existing Nominations for Team</h4>
          <div className="space-y-2">
            {nominations.filter(n => reports.some(r => r.id === n.employeeId)).map(n => {
              const nEmp = employees.find(e => e.id === n.employeeId);
              const prog = training.find(t => t.id === n.programId);
              return (
                <div key={n.id} className="flex items-center justify-between p-2 rounded" style={{background:'var(--bg-tertiary)'}}>
                  <div>
                    <span className="text-sm font-medium">{nEmp ? nEmp.name : n.employeeId}</span>
                    <span className="text-xs ml-2" style={{color:'var(--text-muted)'}}>{prog ? prog.name : n.programId}</span>
                  </div>
                  <StatusBadge status={n.status} />
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// COMPETENCY FRAMEWORK PAGE
// ═══════════════════════════════════════════════════════════════

function FrameworkPage({ categories, onUpdateCategories }) {
  const [editCat, setEditCat] = useState(null);
  const [editComp, setEditComp] = useState(null);
  const [newCatName, setNewCatName] = useState('');
  const [newCatColor, setNewCatColor] = useState('#1EA8E8');
  const [showNewCat, setShowNewCat] = useState(false);
  const [showNewComp, setShowNewComp] = useState(null);
  const [newCompName, setNewCompName] = useState('');
  const [newCompDesc, setNewCompDesc] = useState('');

  function addCategory() {
    if (!newCatName.trim()) return;
    const updated = [...categories, { id: uid(), name: newCatName.trim(), color: newCatColor, competencies: [] }];
    onUpdateCategories(updated);
    setNewCatName(''); setShowNewCat(false);
  }
  function deleteCategory(catId) {
    if (!confirm('Delete this category and all its competencies?')) return;
    onUpdateCategories(categories.filter(c => c.id !== catId));
  }
  function addCompetency(catId) {
    if (!newCompName.trim()) return;
    const updated = categories.map(c => c.id === catId ? {...c, competencies: [...c.competencies, {id: uid(), name: newCompName.trim(), description: newCompDesc.trim()}]} : c);
    onUpdateCategories(updated);
    setNewCompName(''); setNewCompDesc(''); setShowNewComp(null);
  }
  function deleteCompetency(catId, compId) {
    if (!confirm('Delete this competency?')) return;
    const updated = categories.map(c => c.id === catId ? {...c, competencies: c.competencies.filter(co => co.id !== compId)} : c);
    onUpdateCategories(updated);
  }
  function saveCatEdit() {
    if (!editCat) return;
    const updated = categories.map(c => c.id === editCat.id ? {...c, name: editCat.name, color: editCat.color} : c);
    onUpdateCategories(updated);
    setEditCat(null);
  }
  function saveCompEdit() {
    if (!editComp) return;
    const updated = categories.map(c => ({...c, competencies: c.competencies.map(co => co.id === editComp.id ? {...co, name: editComp.name, description: editComp.description} : co)}));
    onUpdateCategories(updated);
    setEditComp(null);
  }

  return (
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold" style={{color:'#E8A020'}}>Competency Framework Manager</h2>
        <button onClick={() => setShowNewCat(true)} className="btn-primary text-sm">+ Add Category</button>
      </div>

      {showNewCat && (
        <div className="card">
          <h3 className="text-sm font-semibold mb-3">New Category</h3>
          <div className="flex items-center gap-3">
            <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="Category Name" className="text-sm flex-1" />
            <input type="color" value={newCatColor} onChange={e => setNewCatColor(e.target.value)} className="w-10 h-10 rounded cursor-pointer" style={{background:'transparent',border:'none'}} />
            <button onClick={addCategory} className="btn-primary text-sm">Add</button>
            <button onClick={() => setShowNewCat(false)} className="btn-ghost text-sm">Cancel</button>
          </div>
        </div>
      )}

      {editCat && (
        <Modal title="Edit Category" onClose={() => setEditCat(null)}>
          <div className="space-y-3">
            <input type="text" value={editCat.name} onChange={e => setEditCat({...editCat, name: e.target.value})} className="w-full text-sm" />
            <input type="color" value={editCat.color} onChange={e => setEditCat({...editCat, color: e.target.value})} className="w-10 h-10 rounded cursor-pointer" style={{background:'transparent',border:'none'}} />
            <div className="flex gap-2"><button onClick={saveCatEdit} className="btn-primary text-sm">Save</button><button onClick={() => setEditCat(null)} className="btn-ghost text-sm">Cancel</button></div>
          </div>
        </Modal>
      )}

      {editComp && (
        <Modal title="Edit Competency" onClose={() => setEditComp(null)}>
          <div className="space-y-3">
            <input type="text" value={editComp.name} onChange={e => setEditComp({...editComp, name: e.target.value})} className="w-full text-sm" placeholder="Name" />
            <textarea value={editComp.description} onChange={e => setEditComp({...editComp, description: e.target.value})} className="w-full text-sm" rows={3} placeholder="Description" />
            <div className="flex gap-2"><button onClick={saveCompEdit} className="btn-primary text-sm">Save</button><button onClick={() => setEditComp(null)} className="btn-ghost text-sm">Cancel</button></div>
          </div>
        </Modal>
      )}

      {categories.map(cat => (
        <div key={cat.id} className="card">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full" style={{background: cat.color}}></div>
              <h3 className="text-sm font-semibold" style={{color: cat.color}}>{cat.name}</h3>
              <span className="text-xs" style={{color:'var(--text-muted)'}}>({cat.competencies.length} competencies)</span>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setShowNewComp(cat.id)} className="btn-ghost text-xs">+ Add Competency</button>
              <button onClick={() => setEditCat({...cat})} className="btn-ghost text-xs">Edit</button>
              <button onClick={() => deleteCategory(cat.id)} className="text-xs px-2 py-1 rounded hover:bg-red-900/30" style={{color:'#E84040'}}>Delete</button>
            </div>
          </div>
          {showNewComp === cat.id && (
            <div className="p-3 rounded-lg mb-3" style={{background:'var(--bg-tertiary)'}}>
              <input type="text" value={newCompName} onChange={e => setNewCompName(e.target.value)} placeholder="Competency Name" className="w-full text-sm mb-2" />
              <textarea value={newCompDesc} onChange={e => setNewCompDesc(e.target.value)} placeholder="Description" className="w-full text-sm mb-2" rows={2} />
              <div className="flex gap-2">
                <button onClick={() => addCompetency(cat.id)} className="btn-primary text-xs">Add</button>
                <button onClick={() => {setShowNewComp(null);setNewCompName('');setNewCompDesc('');}} className="btn-ghost text-xs">Cancel</button>
              </div>
            </div>
          )}
          <div className="space-y-1">
            {cat.competencies.map(comp => (
              <div key={comp.id} className="flex items-center justify-between p-2 rounded hover:bg-gray-900/30" style={{borderBottom:'1px solid var(--border-color)'}}>
                <div>
                  <div className="text-sm">{comp.name}</div>
                  <div className="text-xs" style={{color:'var(--text-muted)'}}>{comp.description}</div>
                </div>
                <div className="flex gap-2 flex-shrink-0 ml-3">
                  <button onClick={() => setEditComp({...comp})} className="text-xs px-2 py-1 rounded" style={{color:'#1EA8E8'}}>Edit</button>
                  <button onClick={() => deleteCompetency(cat.id, comp.id)} className="text-xs px-2 py-1 rounded" style={{color:'#E84040'}}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// TRAINING HUB PAGE

  const reports = isManager ? getAllReports(currentUser, employees) : [];

                <span>Duration: {t.duration}</span>
                <span>Mode: {t.mode}</span>
              </div>
              <div className="flex flex-wrap gap-1 mt-3">
                {t.competencies.map(cid => {

        <div className="card">
          <h3 className="text-sm font-semibold mb-3">All Nominations {isManager ? '(Manager View)' : ''}</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">

                <tr style={{borderBottom:'1px solid var(--border-color)'}}>
                  <th className="text-left p-2" style={{color:'var(--text-muted)'}}>Employee</th>

                  <th className="text-left p-2" style={{color:'var(--text-muted)'}}>Nominated By</th>
                  <th className="text-left p-2" style={{color:'var(--text-muted)'}}>Date</th>
                  <th className="text-center p-2" style={{color:'var(--text-muted)'}}>Status</th>

              </thead>
              <tbody>
                {nominations.map(n => {
                  const nEmp = employees.find(e => e.id === n.employeeId);
                  const prog = training.find(t => t.id === n.programId);
                  const nomBy = employees.find(e => e.id === n.nominatedBy);
                  return (
                    <tr key={n.id} style={{borderBottom:'1px solid var(--border-color)'}}>

}
