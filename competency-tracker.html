// GAP ANALYSIS PAGE
// ═══════════════════════════════════════════════════════════════

function GapAnalysisPage({ employees, categories, assessments }) {
  const [filterTeam, setFilterTeam] = useState('all');
  const [filterLevel, setFilterLevel] = useState('all');
  const [filterCat, setFilterCat] = useState('all');
  const allComps = categories.flatMap(c => c.competencies);
  const departments = [...new Set(employees.map(e => e.department))];
  const levels = ['IL2','IL3','IL4','IL5','IL6'];

  let filtered = employees;
  if (filterTeam !== 'all') filtered = filtered.filter(e => e.department === filterTeam);
  if (filterLevel !== 'all') filtered = filtered.filter(e => e.level === filterLevel);

  const displayCats = filterCat === 'all' ? categories : categories.filter(c => c.id === filterCat);
  const displayComps = displayCats.flatMap(c => c.competencies);

  // Build gap data
  const gapData = [];
  filtered.forEach(emp => {
    const a = getLatestAssessment(emp.id, 'self', assessments);
    if (!a) return;
    displayComps.forEach(comp => {
      const score = a.scores[comp.id];
      if (score !== undefined && score < TRAINING_THRESHOLD) {
        gapData.push({ employee: emp, competency: comp, score });
      }
    });
  });

  function handleExport() {
    const headers = ['Employee','Level','Team','Competency','Score','Status'];
    const rows = gapData.map(g => [g.employee.name, g.employee.level, g.employee.team, g.competency.name, g.score, 'Training Needed']);
    exportCSV(headers, rows, 'gap_analysis_report.csv');
  }

  // Heatmap: employees vs competency categories
  const heatRows = filtered.filter(e => assessments.some(a => a.employeeId === e.id));
  const heatCols = displayCats;
  function heatmapVal(emp, cat) {
    const a = getLatestAssessment(emp.id, 'self', assessments);
    return a ? getCategoryAvg(a.scores, cat) : 0;
  }

  // Competency bar chart data
  const compAvgs = displayComps.map(comp => {
    const vals = filtered.map(emp => {
      const a = getLatestAssessment(emp.id, 'self', assessments);
      return a ? a.scores[comp.id] : undefined;
    }).filter(v => v !== undefined);
    return { name: comp.name, avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0 };
  }).sort((a,b) => a.avg - b.avg);

  return (
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold" style={{color:'#1EA8E8'}}>Gap Analysis & Reports</h2>
        <button onClick={handleExport} className="btn-ghost text-sm">Export CSV</button>
      </div>

      <div className="flex gap-3 flex-wrap items-center">
        <div className="flex items-center gap-2">
          <label className="text-xs" style={{color:'var(--text-muted)'}}>Team:</label>
          <select value={filterTeam} onChange={e => setFilterTeam(e.target.value)} className="text-sm">
            <option value="all">All Departments</option>
            {departments.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <div className="flex items-center gap-2">
          <label className="text-xs" style={{color:'var(--text-muted)'}}>Level:</label>
          <select value={filterLevel} onChange={e => setFilterLevel(e.target.value)} className="text-sm">
            <option value="all">All Levels</option>
            {levels.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
        </div>
        <div className="flex items-center gap-2">
          <label className="text-xs" style={{color:'var(--text-muted)'}}>Category:</label>
          <select value={filterCat} onChange={e => setFilterCat(e.target.value)} className="text-sm">
            <option value="all">All Categories</option>
            {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
      </div>

      <div className="card">
        <h3 className="text-sm font-semibold mb-3">Competency Averages (Filtered)</h3>
        <div style={{height: Math.max(300, compAvgs.length * 28)}}>
          <BarChart
            labels={compAvgs.map(c => c.name.length > 25 ? c.name.slice(0,25)+'...' : c.name)}
            datasets={[{
              label: 'Avg Score',
              data: compAvgs.map(c => Number(c.avg.toFixed(2))),
              backgroundColor: compAvgs.map(c => c.avg < TRAINING_THRESHOLD ? '#E8404088' : '#1EA8E888'),
              borderColor: compAvgs.map(c => c.avg < TRAINING_THRESHOLD ? '#E84040' : '#1EA8E8'),
              borderWidth: 1
            }]}
            horizontal={true}
          />
        </div>
      </div>

      <div className="card">
        <h3 className="text-sm font-semibold mb-3">Org-wide Heatmap</h3>
        {heatRows.length > 0 ? (
          <Heatmap rows={heatRows} columns={heatCols} getData={heatmapVal} getRowLabel={r => r.name} getColLabel={c => c.name} />
        ) : <div className="text-sm" style={{color:'var(--text-muted)'}}>No assessed employees match the current filter.</div>}
      </div>

      <div className="card">
        <h3 className="text-sm font-semibold mb-3" style={{color:'#E84040'}}>Individual Gap Cards ({gapData.length} gaps found)</h3>
        {gapData.length === 0 ? (
          <div className="text-sm" style={{color:'var(--text-muted)'}}>No gaps found with current filters.</div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {gapData.slice(0, 30).map((g, i) => (
              <div key={i} className="p-3 rounded-lg" style={{background:'var(--bg-tertiary)',border:'1px solid rgba(232,64,64,.2)'}}>
                <div className="font-semibold text-sm">{g.employee.name}</div>
                <div className="text-xs" style={{color:'var(--text-muted)'}}>{g.employee.role} | {g.employee.level}</div>
                <div className="flex items-center justify-between mt-2">
                  <span className="text-xs">{g.competency.name}</span>
                  <span className="font-bold" style={{color: scoreColor(g.score)}}>{g.score}/5</span>
                </div>
              </div>
            ))}
          </div>
        )}
        {gapData.length > 30 && <div className="text-xs mt-3 text-center" style={{color:'var(--text-muted)'}}>Showing 30 of {gapData.length} gaps. Export CSV for full report.</div>}
      </div>
    </div>
  );
}

// ORG OVERVIEW PAGE
// ═══════════════════════════════════════════════════════════════

function OrgOverviewPage({ employees, categories, assessments, onNavigate }) {
  const [selectedEmp, setSelectedEmp] = useState(null);

  function renderTree(parentId, depth = 0) {
    const children = employees.filter(e => e.reportsTo === parentId).sort((a,b) => {
      const lo = {IL2:0,IL3:1,IL4:2,IL5:3,IL6:4};
      return (lo[a.level]||5) - (lo[b.level]||5);
    });
    if (children.length === 0) return null;
    return (
      <div className={depth > 0 ? 'ml-6 mt-1' : 'mt-2'}>
        {children.map(emp => {
          const a = getLatestAssessment(emp.id, 'self', assessments);
          const avg = a ? avgScore(a.scores) : null;
          const deptColor = COE_COLORS[emp.department] || '#3A5068';
          return (
            <div key={emp.id} className="mb-1">
              <div className="org-node inline-flex items-center gap-2" onClick={() => setSelectedEmp(emp.id)} style={{borderLeftColor: deptColor, borderLeftWidth: 3}}>
                <LevelBadge level={emp.level} />
                <span className="font-medium text-sm">{emp.name}</span>
                <span className="text-xs" style={{color:'var(--text-muted)'}}>- {emp.role}</span>
                {avg !== null && <ScoreBadge score={avg} />}
              </div>
              {renderTree(emp.id, depth + 1)}
            </div>
          );
        })}
      </div>
    );
  }

  const selEmp = selectedEmp ? employees.find(e => e.id === selectedEmp) : null;
  const selAssessment = selectedEmp ? getLatestAssessment(selectedEmp, 'self', assessments) : null;

  return (
    <div className="fade-in space-y-5">
      <h2 className="text-xl font-bold" style={{color:'#E8A020'}}>Org Overview</h2>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 card" style={{maxHeight:'70vh',overflowY:'auto'}}>
          <h3 className="text-sm font-semibold mb-3">Organization Hierarchy</h3>
          {/* CDO at root */}
          {employees.filter(e => !e.reportsTo).map(emp => {
            const a = getLatestAssessment(emp.id, 'self', assessments);
            const avg = a ? avgScore(a.scores) : null;
            return (
              <div key={emp.id}>
                <div className="org-node inline-flex items-center gap-2" onClick={() => setSelectedEmp(emp.id)} style={{borderLeftColor:'#E8A020',borderLeftWidth:3}}>
                  <LevelBadge level={emp.level} />
                  <span className="font-medium">{emp.name}</span>
                  <span className="text-xs" style={{color:'#E8A020'}}>- {emp.role}</span>
                  {avg !== null && <ScoreBadge score={avg} />}
                </div>
                {renderTree(emp.id, 1)}
              </div>
            );
          })}
        </div>

        <div className="card">
          <h3 className="text-sm font-semibold mb-3">Employee Details</h3>
          {selEmp ? (
            <div className="space-y-3">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-full flex items-center justify-center font-bold" style={{background:'var(--bg-deep)',color:'#E8A020'}}>
                  {selEmp.name.split(' ').map(n=>n[0]).join('')}
                </div>
                <div>
                  <div className="font-semibold">{selEmp.name}</div>
                  <div className="text-xs" style={{color:'var(--text-muted)'}}>{selEmp.role}</div>
                </div>
              </div>
              <div className="text-xs space-y-1" style={{color:'var(--text-primary)'}}>
                <div><span style={{color:'var(--text-muted)'}}>Level:</span> <LevelBadge level={selEmp.level} /></div>
                <div><span style={{color:'var(--text-muted)'}}>Team:</span> {selEmp.team}</div>
                <div><span style={{color:'var(--text-muted)'}}>Department:</span> {selEmp.department}</div>
                <div><span style={{color:'var(--text-muted)'}}>Reports to:</span> {selEmp.reportsTo ? (employees.find(e => e.id === selEmp.reportsTo)?.name || 'N/A') : 'None'}</div>
              </div>
              {selAssessment ? (
                <>
                  <div className="text-sm">Overall: <span className="font-bold" style={{color: scoreColor(avgScore(selAssessment.scores))}}>{avgScore(selAssessment.scores).toFixed(1)}</span></div>
                  <div className="space-y-2">
                    {categories.map(cat => {
                      const val = getCategoryAvg(selAssessment.scores, cat);
                      return (
                        <div key={cat.id}>
                          <div className="flex justify-between text-xs mb-1">
                            <span style={{color: cat.color}}>{cat.name}</span>
                            <span style={{color: scoreColor(val)}}>{val.toFixed(1)}</span>
                          </div>
                          <div className="h-1.5 rounded-full" style={{background:'var(--bg-deep)'}}>
                            <div className="h-1.5 rounded-full" style={{width:`${val/5*100}%`,background: cat.color}}></div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              ) : <div className="text-xs" style={{color:'var(--text-muted)'}}>No assessment data available.</div>}
            </div>
          ) : <div className="text-sm" style={{color:'var(--text-muted)'}}>Click on an employee in the org tree to view details.</div>}
        </div>
      </div>
    </div>
  );
}

const SUPABASE_SQL_SCHEMA = `-- Employees table
CREATE TABLE employees (
  id TEXT PRIMARY KEY,
  name TEXT NOT NULL,
  role TEXT NOT NULL,
  level TEXT NOT NULL,
  team TEXT NOT NULL,
  department TEXT,
  reports_to TEXT REFERENCES employees(id),
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Competency Categories
CREATE TABLE competency_categories (
  id TEXT PRIMARY KEY,
  name TEXT NOT NULL,
  color TEXT DEFAULT '#1EA8E8',
  sort_order INTEGER DEFAULT 0,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Competencies
CREATE TABLE competencies (
  id TEXT PRIMARY KEY,
  category_id TEXT REFERENCES competency_categories(id) ON DELETE CASCADE,
  name TEXT NOT NULL,
  description TEXT,
  threshold INTEGER DEFAULT 3,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Assessments (historical - one row per employee per competency per quarter)
CREATE TABLE assessments (
  id TEXT PRIMARY KEY,
  employee_id TEXT REFERENCES employees(id) ON DELETE CASCADE,
  competency_id TEXT REFERENCES competencies(id) ON DELETE CASCADE,
  self_score INTEGER CHECK (self_score BETWEEN 1 AND 5),
  manager_score INTEGER CHECK (manager_score BETWEEN 1 AND 5),
  quarter TEXT NOT NULL,
  year INTEGER NOT NULL,
  assessed_date TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(employee_id, competency_id, quarter, year)
);

-- Training Programs
CREATE TABLE training_programs (
  id TEXT PRIMARY KEY,
  name TEXT NOT NULL,
  description TEXT,
  duration TEXT,
  competency_ids TEXT[],
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Training Nominations
CREATE TABLE training_nominations (
  id TEXT PRIMARY KEY,
  employee_id TEXT REFERENCES employees(id) ON DELETE CASCADE,
  training_id TEXT REFERENCES training_programs(id) ON DELETE CASCADE,
  status TEXT DEFAULT 'Nominated' CHECK (status IN ('Nominated', 'Approved', 'In Progress', 'Completed', 'Cancelled')),
  nominated_by TEXT REFERENCES employees(id),
  nominated_date TIMESTAMPTZ DEFAULT NOW(),
  completion_date TIMESTAMPTZ,
  notes TEXT
);

-- Row Level Security (enable for all tables)
ALTER TABLE employees ENABLE ROW LEVEL SECURITY;
ALTER TABLE competency_categories ENABLE ROW LEVEL SECURITY;
ALTER TABLE competencies ENABLE ROW LEVEL SECURITY;
ALTER TABLE assessments ENABLE ROW LEVEL SECURITY;
ALTER TABLE training_programs ENABLE ROW LEVEL SECURITY;
ALTER TABLE training_nominations ENABLE ROW LEVEL SECURITY;

-- Allow all operations with anon key (for internal tool without auth)
CREATE POLICY "Allow all" ON employees FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all" ON competency_categories FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all" ON competencies FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all" ON assessments FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all" ON training_programs FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all" ON training_nominations FOR ALL USING (true) WITH CHECK (true);`;

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">

          <div className="flex items-center gap-3 mb-3">

              <div className="w-2.5 h-2.5 rounded-full" style={{background: statusColors[connStatus]}}></div>

          {connMsg && <div className="text-xs mb-3" style={{color: connStatus === 'connected' ? '#1EC88A' : connStatus === 'error' ? '#E84040' : '#E8A020'}}>{connMsg}</div>}

      {/* Database Schema */}

function EmployeeManagementPage({ employees, onUpdateEmployees, assessments, nominations, onUpdateAssessments, onUpdateNominations }) {
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [showDeleteAll, setShowDeleteAll] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [formName, setFormName] = useState('');
  const [formRole, setFormRole] = useState('');
  const [formLevel, setFormLevel] = useState('IL5');
  const [formTeam, setFormTeam] = useState('');
  const [formReportsTo, setFormReportsTo] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [savedMsg, setSavedMsg] = useState('');

  const teams = [...new Set(employees.map(e => e.team))].sort();
  const departments = [...new Set(employees.map(e => e.department))].sort();

  const filtered = employees.filter(e => {
    const q = search.toLowerCase();
    return !q || e.name.toLowerCase().includes(q) || e.team.toLowerCase().includes(q) || e.department.toLowerCase().includes(q) || e.role.toLowerCase().includes(q);
  }).sort((a,b) => {
    const lo = {IL2:0,IL3:1,IL4:2,IL5:3,IL6:4};
    return (lo[a.level]||5) - (lo[b.level]||5);
  });

  function resetForm() {
    setFormName(''); setFormRole(''); setFormLevel('IL5'); setFormTeam(''); setFormReportsTo('');
    setEditingId(null); setShowForm(false);
  }

  function handleEdit(emp) {
    setEditingId(emp.id);
    setFormName(emp.name);
    setFormRole(emp.role);
    setFormLevel(emp.level);
    setFormTeam(emp.team);
    setFormReportsTo(emp.reportsTo || '');
    setShowForm(true);
  }

  function handleSave() {
    if (!formName.trim() || !formRole.trim()) return;
    const reportsToEmp = employees.find(e => e.id === formReportsTo);
    const dept = reportsToEmp ? reportsToEmp.department : formTeam;
    if (editingId) {
      const updated = employees.map(e => e.id === editingId ? {...e, name: formName.trim(), role: formRole.trim(), level: formLevel, team: formTeam || e.team, department: dept || e.department, reportsTo: formReportsTo || null} : e);
      onUpdateEmployees(updated);
      setSavedMsg('Employee updated successfully.');
    } else {
      const newId = 'E' + String(employees.length + 1).padStart(3, '0') + '_' + Date.now().toString(36);
      const newEmp = { id: newId, name: formName.trim(), role: formRole.trim(), level: formLevel, team: formTeam, department: dept || formTeam, reportsTo: formReportsTo || null };
      onUpdateEmployees([...employees, newEmp]);
      setSavedMsg('New employee added successfully.');
    }
    resetForm();
    setTimeout(() => setSavedMsg(''), 3000);
  }

  function handleDelete(empId) {
    const emp = employees.find(e => e.id === empId);
    if (emp && emp.level === 'IL2') { setSavedMsg('Cannot delete CDO record.'); setTimeout(() => setSavedMsg(''), 3000); setConfirmDelete(null); return; }
    const updated = employees.filter(e => e.id !== empId);
    // Reassign reports: anyone reporting to deleted employee now reports to that employee's manager
    const deleted = employees.find(e => e.id === empId);
    const parentId = deleted ? deleted.reportsTo : null;
    const reassigned = updated.map(e => e.reportsTo === empId ? {...e, reportsTo: parentId} : e);
    onUpdateEmployees(reassigned);
    // Clean up assessments and nominations
    const cleanAssessments = assessments.filter(a => a.employeeId !== empId && a.assessorId !== empId);
    onUpdateAssessments(cleanAssessments);
    const cleanNominations = nominations.filter(n => n.employeeId !== empId && n.nominatedBy !== empId);
    onUpdateNominations(cleanNominations);
    setConfirmDelete(null);
    setSavedMsg('Employee deleted and related data cleaned up.');
    setTimeout(() => setSavedMsg(''), 3000);
  }

  return (
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold" style={{color:'#E8A020'}}>Employee Management</h2>
        <div className="flex gap-2">
          <button onClick={() => { resetForm(); setShowForm(true); }} className="btn-primary text-sm">+ Add Employee</button>
          <button onClick={() => setShowDeleteAll(true)} className="text-sm px-3 py-1.5 rounded-lg font-semibold" style={{background:'#EF444422',border:'1px solid #EF444455',color:'#EF4444',cursor:'pointer'}}>Delete All</button>
        </div>
      </div>

      {showDeleteAll && (
        <div className="p-4 rounded-lg" style={{background:'#EF444415',border:'1px solid #EF444444'}}>
          <p className="text-sm font-semibold mb-2" style={{color:'#EF4444'}}>Are you sure you want to delete ALL employees except CDO?</p>
          <p className="text-xs mb-3" style={{color:'var(--text-muted)'}}>This will remove {employees.filter(e => e.level !== 'IL2').length} employees and their assessments & nominations. The CDO record will be preserved.</p>
          <div className="flex gap-2">
            <button onClick={() => { const cdo = employees.filter(e => e.level === 'IL2'); const removedIds = employees.filter(e => e.level !== 'IL2').map(e => e.id); const keptAssessments = assessments.filter(a => !removedIds.includes(a.employeeId)); const keptNominations = nominations.filter(n => !removedIds.includes(n.employeeId)); onUpdateEmployees(cdo); onUpdateAssessments(keptAssessments); onUpdateNominations(keptNominations); localStorage.setItem('ct_employees', JSON.stringify(cdo)); localStorage.setItem('ct_assessments', JSON.stringify(keptAssessments)); localStorage.setItem('ct_nominations', JSON.stringify(keptNominations)); setShowDeleteAll(false); setSavedMsg('All employees except CDO deleted.'); setTimeout(() => setSavedMsg(''), 3000); }} className="text-sm px-3 py-1.5 rounded-lg font-semibold" style={{background:'#EF4444',color:'#FFF',cursor:'pointer',border:'none'}}>Yes, Delete All (Keep CDO)</button>
            <button onClick={() => setShowDeleteAll(false)} className="btn-ghost text-sm">Cancel</button>
          </div>
        </div>
      )}

      {savedMsg && <div className="p-3 rounded-lg text-sm" style={{background:'#1EC88A22',border:'1px solid #1EC88A44',color:'#1EC88A'}}>{savedMsg}</div>}

      <div className="p-3 rounded-lg text-xs" style={{background:'var(--bg-tertiary)',border:'1px solid var(--border-color)',color:'var(--text-muted)'}}>
        Tip: For bulk import, prepare data and contact admin.
      </div>

      {showForm && (
        <div className="card">
          <h3 className="text-sm font-semibold mb-4" style={{color:'var(--text-primary)'}}>{editingId ? 'Edit Employee' : 'Add New Employee'}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label className="text-xs block mb-1" style={{color:'var(--text-muted)'}}>Name *</label>
              <input type="text" value={formName} onChange={e => setFormName(e.target.value)} placeholder="Full Name" className="w-full text-sm" />
            </div>
            <div>
              <label className="text-xs block mb-1" style={{color:'var(--text-muted)'}}>Designation / Role *</label>
              <input type="text" value={formRole} onChange={e => setFormRole(e.target.value)} placeholder="e.g. Sr. Manager - Data Engineering" className="w-full text-sm" />
            </div>
            <div>
              <label className="text-xs block mb-1" style={{color:'var(--text-muted)'}}>IL Level</label>
              <select value={formLevel} onChange={e => setFormLevel(e.target.value)} className="w-full text-sm">
                <option value="IL2">IL2 - Chief Data Officer</option>
                <option value="IL3">IL3 - Head / Sr. General Manager</option>
                <option value="IL4">IL4 - Sr. Area Manager / Area Manager</option>
                <option value="IL5">IL5 - Sr. Manager / Manager</option>
                <option value="IL6">IL6 - Assistant Manager</option>
              </select>
            </div>
            <div>
              <label className="text-xs block mb-1" style={{color:'var(--text-muted)'}}>Team / Department</label>
              <input type="text" list="team-list" value={formTeam} onChange={e => setFormTeam(e.target.value)} placeholder="Type or select team" className="w-full text-sm" />
              <datalist id="team-list">
                {[...teams, 'CDO Office','Cloud & Lakehouse Architecture','Data Engineering & Pipelines','MLOps & DevSecOps','DataOps & Observability','API & Data Mesh Fabric','Enterprise Ontology & Knowledge Graph','Semantic / Metric Layer','Data Science & AI / ML','GenAI & LLM Enablement','Analytics Engineering & BI','Analytics Translation','Data Governance & Policy','Data Quality Management','Data Catalogue & Metadata','Master & Reference Data (MDM)','Data Privacy, Risk & Literacy','Raw Materials','Operations','GSP, Supply Chain & Logistics','Marketing & Sales','Corporate Services & Functions','Finance','HRM','SHS','Technology & R&D','Engineering & Projects','Shared Services'].filter((v,i,a) => a.indexOf(v) === i).sort().map(t => <option key={t} value={t} />)}

              </select>
            </div>
          </div>
          <div className="flex gap-2 mt-4">
            <button onClick={handleSave} className="btn-primary text-sm">{editingId ? 'Update Employee' : 'Add Employee'}</button>
            <button onClick={resetForm} className="btn-ghost text-sm">Cancel</button>
          </div>
        </div>
      )}

      {confirmDelete && (
        <Modal title="Confirm Deletion" onClose={() => setConfirmDelete(null)}>
          <div className="space-y-4">
            <p className="text-sm">Are you sure you want to delete <strong>{employees.find(e => e.id === confirmDelete)?.name}</strong>?</p>
            <p className="text-xs" style={{color:'var(--text-muted)'}}>This will also remove their assessments and nominations. Direct reports will be reassigned to their manager.</p>
            <div className="flex gap-2">
              <button onClick={() => handleDelete(confirmDelete)} className="btn-danger text-sm">Delete Employee</button>
              <button onClick={() => setConfirmDelete(null)} className="btn-ghost text-sm">Cancel</button>

                    <td className="p-2 font-medium">{emp.name}</td>
                    <td className="p-2">{emp.role}</td>
                    <td className="text-center p-2"><LevelBadge level={emp.level} /></td>
                    <td className="p-2">{emp.team}</td>
                    <td className="p-2">{mgr ? mgr.name : '-'}</td>
                    <td className="text-center p-2">
                      <div className="flex gap-1 justify-center">
                        <button onClick={() => handleEdit(emp)} className="text-xs px-2 py-1 rounded" style={{color:'#1EA8E8',background:'#1EA8E822'}}>Edit</button>
                        <button onClick={() => setConfirmDelete(emp.id)} className="text-xs px-2 py-1 rounded" style={{color:'#E84040',background:'#E8404022'}}>Delete</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [currentUser, setCurrentUser] = useState(DataLayer.getCurrentUser());
  const [page, setPage] = useState('dashboard');
  const [dataVersion, setDataVersion] = useState(0);

  // Theme state - default to light
  const [theme, setTheme] = useState(() => {
    const saved = localStorage.getItem('ct_theme');
    return saved || 'light';
  });

  // Apply theme to document root synchronously and persist
  function applyTheme(t) {
    if (t === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    localStorage.setItem('ct_theme', t);
  }

  // Apply on mount
  useEffect(() => { applyTheme(theme); }, []);

  function toggleTheme() {
    setTheme(prev => {
      const next = prev === 'light' ? 'dark' : 'light';
      applyTheme(next);
      return next;
    });
  }

  const employees = useMemo(() => DataLayer.getEmployees(), [dataVersion]);
  const categories = useMemo(() => DataLayer.getCategories(), [dataVersion]);
  const assessments = useMemo(() => DataLayer.getAssessments(), [dataVersion]);
  const training = useMemo(() => DataLayer.getTraining(), [dataVersion]);
  const nominations = useMemo(() => DataLayer.getNominations(), [dataVersion]);

  const emp = employees.find(e => e.id === currentUser);
  const isManager = emp && ['IL2','IL3','IL4'].includes(emp.level);
  const isCDO = isAdminUser(emp);

  function handleUserChange(id) {
    setCurrentUser(id);
    DataLayer.setCurrentUser(id);
    setPage('dashboard');
  }

  function handleSaveAssessment(assessment) {
    DataLayer.addAssessment(assessment);
    setDataVersion(v => v + 1);
  }

  function handleUpdateCategories(cats) {
    DataLayer.setCategories(cats);
    setDataVersion(v => v + 1);
  }

  function handleUpdateNomination(id, updates) {
    DataLayer.updateNomination(id, updates);
    setDataVersion(v => v + 1);
  }

  function handleAddNomination(nom) {
    DataLayer.addNomination(nom);
    setDataVersion(v => v + 1);
  }

  function handleUpdateEmployees(emps) {
    DataLayer.setEmployees(emps);
    setDataVersion(v => v + 1);
  }

  function handleUpdateAssessments(a) {
    DataLayer.setAssessments(a);
    setDataVersion(v => v + 1);
  }

  function handleUpdateNominations(n) {
    DataLayer.setNominations(n);
    setDataVersion(v => v + 1);
  }

  function handleReset() {
    DataLayer.resetAll();
    setDataVersion(v => v + 1);
    setCurrentUser('E001');
    setPage('dashboard');
  }

  // Redirect non-managers away from team view
  useEffect(() => {
    if (page === 'team' && !isManager) setPage('dashboard');
    if (page === 'framework' && !isCDO) setPage('dashboard');
    if (page === 'employee-mgmt' && !isCDO) setPage('dashboard');
  }, [page, currentUser]);

  function renderPage() {
    switch (page) {
      case 'dashboard':
        return <DashboardPage employees={employees} categories={categories} assessments={assessments} nominations={nominations} currentUser={currentUser} />;
      case 'profile':
        return <ProfilePage currentUser={currentUser} employees={employees} categories={categories} assessments={assessments} nominations={nominations} training={training} />;
      case 'self-assessment':
        return <SelfAssessmentPage currentUser={currentUser} employees={employees} categories={categories} assessments={assessments} onSaveAssessment={handleSaveAssessment} />;
      case 'team':
        return <TeamViewPage currentUser={currentUser} employees={employees} categories={categories} assessments={assessments} onSaveAssessment={handleSaveAssessment} nominations={nominations} training={training} onAddNomination={handleAddNomination} />;
      case 'framework':
        return <FrameworkPage categories={categories} onUpdateCategories={handleUpdateCategories} />;
      case 'employee-mgmt':
        return <EmployeeManagementPage employees={employees} onUpdateEmployees={handleUpdateEmployees} assessments={assessments} nominations={nominations} onUpdateAssessments={handleUpdateAssessments} onUpdateNominations={handleUpdateNominations} />;
      case 'training':
        return <TrainingHubPage currentUser={currentUser} employees={employees} categories={categories} training={training} nominations={nominations} onUpdateNomination={handleUpdateNomination} onAddNomination={handleAddNomination} />;
      case 'gap-analysis':
        return <GapAnalysisPage employees={employees} categories={categories} assessments={assessments} />;
      case 'org':
        return <OrgOverviewPage employees={employees} categories={categories} assessments={assessments} onNavigate={setPage} />;
      case 'settings':
        return <SettingsPage onReset={handleReset} isCDO={isCDO} onDataVersionBump={() => setDataVersion(v => v + 1)} />;
      default:
        return <DashboardPage employees={employees} categories={categories} assessments={assessments} nominations={nominations} currentUser={currentUser} />;
    }
  }

  return (
    <div className="min-h-screen" style={{background:'var(--bg-primary)',transition:'background-color .3s'}}>
      <Header currentUser={currentUser} employees={employees} onUserChange={handleUserChange} theme={theme} onToggleTheme={toggleTheme} />
      <div className="flex">
        <Sidebar activePage={page} onNavigate={setPage} currentUser={currentUser} employees={employees} />
        <main className="flex-1 p-5 overflow-y-auto" style={{maxHeight:'calc(100vh - 52px)'}}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
